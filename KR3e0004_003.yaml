body:
  text: 奇經八脈第三二十七難曰脈有奇經八脈者不拘於十二經何謂也然有陽維有陰維有陽蹻有陰蹻有衝有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不虞天雨降下溝渠溢滿當此之時雱霈妄作聖人不能復圖也此絡脈滿溢諸經不能復拘也二十八難曰其奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裏上至風府入屬於腦任脈者起於中極之下以上毛際循腹裏上關元至喉咽衝脈者起於氣衝並足陽明之經夾齊上行至胸中而散也帶脈者起於季脅回身一周陽蹻脈者起於跟中循外踝上行入風池陰蹻脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽維陰維者維絡于身溢畜不能環流灌溉諸經者也故陽維起於諸陽會也陰維起於諸陰交也比于聖人圖設溝渠溝渠滿溢流于深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也二十九難曰奇經之為病何如然陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱陰維為病苦心痛陰蹻為病陽緩而陰急陽蹻為病陰緩而陽急衝之為病逆氣而裏急督之為病脊強而厥任之為病其內苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中此奇經八脈之為病也
