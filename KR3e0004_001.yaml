body:
  text: 經脈診候第一一難曰十二經皆有動脈獨取寸口以決五藏六府死生吉凶之法何謂也然寸口者脈之大會手太陰之脈動也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於身漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周也故五十度復會於手太陰寸口者五藏六府之所終始故法取於寸口也二難曰脈有尺寸何謂也然尺寸者脈之大要會也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也故分寸為尺分尺為寸故陰得尺內一寸陽得寸內九分尺寸終始一寸九分故曰尺寸也三難曰脈有大過有不及有陰陽相乘有覆有溢有關有格何謂也然關之前者陽之動也脈當見九分而浮過者法曰大過減者法曰不及遂上魚為溢為外關內格此陰乘之脈也關之後者陰之動也脈當見一寸而沉過者法曰大過減者法曰不及遂入尺為覆為內關外格此陽乘之脈也故曰覆溢是其真藏之脈人不病而死也四難曰脈有陰陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾也其脈在中浮者陽也沉者陰也故曰陰陽也心肺俱浮何以別之然浮而大散者心也浮而短濇者肺也腎肝俱沉何以別之然牢而長者肝也按之濡舉指來實者腎也脾者中州故其脈在中是陰陽之法也脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此之言寸口有六脈俱動耶然此言者非有六脈俱動也謂浮沉長短滑濇也浮者陽也滑者陽也長者陽也沉者陰也短者陰也濇者陰也所謂一陰一陽者謂脈來沉而滑也一陰二陽者謂脈來沉滑而長也一陰三陽者謂脈來浮滑而長時一沉也所謂一陽一陰者謂脈來浮而濇也一陽二陰者謂脈來長而沉濇也一陽三陰者謂脈來沉濇而短時一浮也各以其經所在名病逆順也五難曰脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也故曰輕重也六難曰脈有陰盛陽虛陽盛陰虛何謂也然浮之損小沉之實大故曰陰盛陽虛沉之損小浮之實大故曰陽盛陰虛是陰陽虛實之意也七難曰經言少陽之至乍小乍大乍短乍長陽明之至浮大而短太陽之至洪大而長少陰之至緊大而長太陰之至緊細而長厥陰之至沉短而緊此六者是平脈邪將病脈邪然皆王脈也其氣以何月各王幾日然冬至之後初得甲子少陽王復得甲子陽明王復得甲子太陽王復得甲子太陰王復得甲子少陰王復得甲子厥陰王王各六十日六六三百六十日以成一歲此三陽三陰之王時日大要也八難曰寸口脈平而死者何謂也然諸十二經脈者皆係於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五藏六府之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絕則莖葉枯矣寸口脈平而死者生氣獨絕於內也九難曰何以別知藏府之病耶然數者府也遲者藏也數則為熱遲則為寒諸陽為熱諸陰為寒故以別知藏府之病也十難曰一脈為十變者何謂也然五邪剛柔相逢之意也假令心脈急甚者肝邪干心也心脈微急者膽邪干小腸也心脈大甚者心邪自干心也心脈微大者小腸邪自干小腸也心脈緩甚者脾邪干心也心脈微緩者胃邪干小腸也心脈濇甚者肺邪干心也心脈微濇者大腸邪干小腸也心脈沉甚者腎邪干心也心脈微沉者膀胱邪干小腸也五藏各有剛柔邪故令一脈輒變為十也十一難曰經言脈不滿五十動而一止一藏無氣者何藏也然人吸者隨陰入呼者因陽出今吸不能至腎至肝而還故知一藏無氣者腎氣先盡也十二難曰經言五藏脈已絕於內用鍼者反實其外五藏脈已絕於外用鍼者反實其內內外之絕何以別之然五藏脈已絕於內者腎肝氣已絕於內也而醫反補其心肺五藏脈已絕於外者其心肺氣已絕於外也而醫反補其腎肝陽絕補陰陰絕補陽是謂實實虛虛損不足益有餘如此死者醫殺之耳十三難曰經言見其色而不得其脈反得相勝之脈者即死得相生之脈者病即自已色之與脈當參相應為之奈何然五藏有五色皆見於面亦當與寸口尺內相應假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮濇而短色黑其脈沉濡而滑此所謂五色之與脈當參相應也脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈濇尺之皮膚亦濇脈滑尺之皮膚亦滑五藏各有聲色臭味當與寸口尺內相應其不相應者病也假令色青其脈浮濇而短若大而緩為相勝浮大而散若小而滑為相生也經言知一為下工知二為中工知三為上工上工者十全九中工者十全八下工者十全六此之謂也十四難曰脈有損至何謂也然至之脈一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絕此至之脈也何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕此謂損之脈也至脈從下上損脈從上下也損脈之為病柰何然一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五藏六府也三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死治損之法奈何然損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也脈有一呼再至一吸再至有一呼三至一吸三至有一呼四至一吸四至有一呼五至一吸五至有一呼六至一吸六至有一呼一至一吸一至有再呼一至再吸一至有呼吸再至脈來如此何以別知其病也然脈來一呼再至一吸再至不大不小曰平一呼三至一吸三至為適得病前大後小即頭痛目眩前小後大即胸滿短氣一呼四至一吸四至病欲甚脈洪大者苦煩滿沉細者腹中痛滑者傷熱濇者中霧露一呼五至一吸五至其人當困沉細夜加浮大晝加不大不小雖困可治其有大小者為難治一呼六至一吸六至為死脈也沉細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當著床所以然者血氣皆不足故也再呼一至再吸一至名曰無魂無魂者當死也人雖能行名曰行尸上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害也所以然者人之有尺譬如樹之有根枝葉雖枯槁根本將自生脈有根本人有元氣故知不死十五難曰經言春脈弦夏脈鉤秋脈毛冬脈石是王脈耶將病脈也然弦鉤毛石者四時之脈也春脈弦者肝東方木也萬物始生未有枝葉故其脈之來濡弱而長故曰弦夏脈鉤者心南方火也萬物之所盛垂枝布葉皆下曲如鉤故其脈之來來疾去遲故曰鉤秋脈毛者肺西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈之來輕虛以浮故曰毛冬脈石者腎北方水也萬物之所藏也盛冬之時水凝如石故其脈之來沉濡而滑故曰石此四時之脈也如有變柰何然春脈弦反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而勁益強如新張弓弦曰死春脈微弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣為本夏脈鉤反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來累累如環如循琅玕曰平來而益數如雞舉足者曰病前曲後居如操帶鉤曰死夏脈微鉤曰平鉤多胃氣少曰病但鉤無胃氣曰死夏以胃氣為本秋脈毛反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來藹藹如車蓋按之益大曰平不上不下如循雞羽曰病按之消索如風吹毛曰死秋脈微毛為平毛多胃氣少曰病但毛無胃氣曰死秋以胃氣為本冬脈石反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來上大下兌濡滑如雀之啄曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死冬脈微石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本胃者水穀之海也主稟四時故皆以胃氣為本是謂四時之變病死生之要會也脾者中州也其平和不可得見衰乃見耳來如雀之啄如水之下漏是脾之衰見也十六難曰脈有三部九候有陰陽有輕重有六十首一脈變為四時離聖久遠各自是其法何以別之然是其病有內外證其病為之柰何然假令得肝脈其外證善潔面青善怒其內證齊左有動氣按之牢若痛其病四肢滿閉癃溲便難轉筋有是者肝也無是者非也假令得心脈其外證面赤口乾喜笑其內證齊上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也假令得脾脈其外證面黃善噫善思善味其內證當齊有動氣按之牢若痛其病腹脹滿食不消體重節痛怠墮嗜臥四肢不收有是者脾也無是者非也假令得肺脈其外證面白善嚏悲愁不樂欲哭其內證齊右有動氣按之牢若痛其病喘欬洒淅寒熱有是者肺也無是者非也假令得腎脈其外證面黑喜恐欠其內證齊下有動氣按之牢若痛其病逆氣少腹急痛泄如下重足脛寒而逆有是者腎也無是者非也十七難曰經言病或有死或有不治自愈或連年月不已其死生存亡可切脈而知之耶然可盡知也診病若閉目不欲見人者脈當得肝脈強急而長而反得肺脈浮短而濇者死也病若開目而渴心下牢者脈當得緊實而數反得沉濡而微者死也病若吐血復鼽衂血者脈當沉細而反浮大而牢者死也病若譫言妄語身當有熱脈當洪大而反手足厥逆脈沉細而微者死也病若大腹而洩者脈當微細而濇反緊大而滑者死也十八難曰脈有三部部有四經手有太陰陽明足有太陽少陰為上下部何謂也然手太陰陽明金也足少陰太陽水也金生水水流下行而不能上故在下部也足厥陰少陽木也生手太陽少陰火也火炎上行而不能下故為上部手心主少陽火生足太陰陽明土土主中宮故在中部也此皆五行子母更相生養者也脈有三部九候各何所主之然三部者寸關尺也九候者浮中沉也上部法天主胸以上至頭之有疾也中部法人主膈以下至齊之有疾也下部法地主齊以下至足之有疾也審而刺之者也人病有沉滯久積聚可切脈而知之耶然診在右脅有積氣得肺脈結脈結甚則積甚結微則氣微診不得肺脈而右脅有積氣者何也然肺脈雖不見右手脈當沉伏其外痼疾同法耶將異也然結者脈來去時一止無常數名曰結也伏者脈行筋下也浮者脈在肉上行也左右表裏法皆如此假令脈結伏者內無積聚脈浮結者外無痼疾有積聚脈不結伏有痼疾脈不浮結為脈不應病病不應脈是為死病也十九難曰經言脈有逆順男女有常而反者何謂也然男子生於寅寅為木陽也女子生於申申為金陰也故男脈在關上女脈在關下是以男子尺脈恒弱女子尺脈恒盛是其常也反者男得女脈女得男脈也其為病何如然男得女脈為不足病在內左得之病則在左右得之病則在右隨脈言之也女得男脈為太過病在四肢左得之病則在左右得之病則在右隨脈言之此之謂也二十難曰經言脈有伏匿伏匿於何藏而言伏匿耶然謂陰陽更相乘更相伏也脈居陰部而反陽脈見者為陽乘陰也雖陽脈時沉濇而短此謂陽中伏陰也脈居陽部而反陰脈見者為陰乘陽也雖陰脈時浮滑而長此謂陰中伏陽也重陽者狂重陰者癲脫陽者見鬼脫陰者目盲二十一難曰經言人形病脈不病曰生脈病形不病曰死何謂也然人形病脈不病非有不病者也謂息數不應脈數也此大法也二十二難曰經言脈有是動有所生病一脈輒變為二病者何也然經言是動者氣也所生病者血也邪在氣氣為是動邪在血血為所生病氣主呴之血主濡之氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後所生病也二十三難曰手足三陰三陽脈之度數可曉以不然手三陽之脈從手至頭長五尺五六合三丈手三陰之脈從手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺足三陽之脈從足至頭長八尺六八四丈八尺足三陰之脈從足至胸長六尺五寸六六三丈六尺五六三尺合三丈九尺人兩足蹻脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈共長一十六丈二尺此所謂經脈長短之數也經脈十二絡脈十五何始何窮也然經脈者行血氣通陰陽以榮於身者也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰別絡十五皆因其原如環無端轉相溉灌朝於寸口人迎以處百病而決死生也經曰明知終始陰陽定矣何謂也然終始者脈之紀也寸口人迎陰陽之氣通於朝使如環無端故曰始也終者三陰三陽之脈絕絕則死死各有形故曰終也二十四難曰手足三陰三陽氣已絕何以為候可知其吉凶不然足少陰氣絕即骨枯少陰者冬脈也伏行而濡於骨髓故骨髓不濡即肉不著骨骨肉不相親即肉濡而卻肉濡而卻故齒長而枯髮無潤澤無潤澤者骨先死戊日篤己日死足太陰氣絕則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則人中滿人中滿則唇反唇反則肉先死甲日篤乙日死足厥陰氣絕即筋縮引卵與舌卷厥陰者肝脈也肝者筋之合也筋者聚於陰器而絡於舌本故脈不榮則筋縮急筋縮急即引卵與舌故舌卷卵縮此筋先死庚日篤辛日死手太陰氣絕即皮毛焦太陰者肺也行氣溫於皮毛者也氣弗榮則皮毛焦皮毛焦則津液去津液去即皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死手少陰氣絕則脈不通脈不通則血不流血不流則色澤去故面黑如黧此血先死壬日篤癸日死五陰氣俱絕者則目眩轉目瞑目瞑者為失志失志者則志先死死即目瞑也六陽氣俱絕者則陰與陽相離陰陽相離則腠理泄絕汗乃出大如貫珠轉出不流即氣先死旦占夕死夕占旦死
