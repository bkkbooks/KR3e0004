body:
  text: 藏府度數第六三十八難曰藏唯有五府獨有六者何也然所以府有六者謂三焦也有原氣之別焉主持諸氣有名而無形其經屬手少陽此外府也故言府有六焉三十九難曰經言府有五藏有六者何也然六府者正有五府也然五藏亦有六藏者謂腎有兩藏也其左為腎右為命門命門者謂精神之所舍也男子以藏精女子以繫胞其氣與腎通故言藏有六也府有五者何也然五藏各有一府三焦亦是一府然不屬於五藏故言府有五焉四十難曰經言肝主色心主臭脾主味肺主聲腎主液鼻者肺之候而反知香臭耳者腎之候而反聞聲其意何也然肺者西方金也金生於巳巳者南方火也火者心心主臭故令鼻知香臭腎者北方水也水生於申申者西方金金者肺肺主聲故令耳聞聲四十一難曰肝獨有兩葉以何應也然肝者東方木也木者春也萬物始生其尚幼小意無所親去太陰尚近離太陽不遠猶有兩心故有兩葉亦應木葉也四十二難曰人腸胃長短受水穀多少各幾何然胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中常留穀二斗水一斗五升小腸大二寸半徑八分分之少半長三丈二尺受穀二斗四升水六升三合合之太半廻腸大四寸徑一寸半長二丈一尺受穀一斗水七升半廣腸大八寸徑二寸半長二尺八寸受穀九升三合八分合之一故腸胃凡長五丈八尺四寸合受水穀八斗七升六合八分合之一此腸胃長短受水穀之數也肝重二斤四兩左三葉右四葉凡七葉主藏魂心重十二兩中有七孔三毛盛精汁三合主藏神脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五藏主藏意肺重三斤三兩六葉兩耳凡八葉主藏魄腎有兩枚重一斤一兩主藏志膽在肝之短葉間重三兩三銖盛精汁三合胃重二斤二兩紆曲屈伸長二尺六寸大一尺五寸徑五寸盛穀二斗水一斗五升小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左廻疊積十六曲盛穀二斗四升水六升三合合之太半大腸重二斤十二兩長二丈一尺廣四寸徑一寸當齊右廻疊積十六曲盛穀一斗水七升半膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半唇至齒長九分齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸喉嚨重十二兩廣二寸長一尺二寸九節肛門重十二兩大八寸徑二寸大半長二尺八寸受穀九升三合八分合之一四十三難曰人不食飲七日而死者何也然人胃中常有留穀二斗水一斗五升故平人日再至圊一行二升半一日中五升七日五七三斗五升而水穀盡矣故平人不食飲七日而死者水穀津液俱盡即死矣四十四難曰七衝門何在然唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門太腸小腸會為闌門下極為魄門故曰七衝門也四十五難曰經言八會者何也然府會大倉藏會季脅筋會陽陵泉髓會絕骨血會鬲俞骨會大抒脈會太淵氣會三焦外一筋直兩乳內也熱病在內者取其會之氣穴也四十六難曰老人臥而不寐少壯寐而不寤者何也然經言少壯者血氣盛肌肉滑氣道通榮衛之行不失於常故晝日精夜不寤也老人血氣衰肌肉不滑榮衛之道濇故晝日不能精夜不得寐也故知老人不得寐也四十七難曰人面獨能耐寒者何也然人頭者諸陽之會也諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭耳故令面耐寒也
