body:
  text: 神聖工巧第十一六十一難曰經言望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧何謂也然望而知之者望見其五色以知其病聞而知之者聞其五音以別其病問而知之者問其所欲五味以知其病所起所在也切脈而知之者診其寸口視其虛實以知其病病在何藏府也經言以外知之曰聖以內知之曰神此之謂也
