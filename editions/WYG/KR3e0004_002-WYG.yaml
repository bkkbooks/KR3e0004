body:
  text: 難經本義卷下元滑夀撰三十一難曰三焦者何禀何生何始何終其始常在何許可曉與否然三焦者水穀之道路氣之所終始也上焦者在心下下鬲在胃上口主内而不出其治在膻中王堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水穀其治在臍傍下焦者在胃下脘膀胱上口主分别清濁主出而不内以傳道也其治在臍下一寸故名曰三焦其府在氣街一本作衝人身之藏府有形有狀有禀有生如肝氣禀於木生於水心禀氣於火生於木之類莫不皆然唯三焦既無形狀而所禀所生則元氣與胃氣而已故云水糓之道路氣之所終始也上焦其治在膻中中焦其治在臍膀天樞宂下焦其治在臍下一寸隂交宂治猶司也司猶郡縣治之治謂三焦處所也或云治作平聲讀謂三焦有病當各治其處葢刺法也三焦相火也火能腐熟萬物焦從火亦腐物之氣命名取義或有在於此歟靈樞第十八篇曰上焦出於胃上口並咽以上大膈而布胸中走腋循太隂之分而行還至陽明上至舌下足陽明常與營衛俱行於陽二十五度行於隂亦二十五度一周也故五十度而復大㑹於手太隂矣中焦亦傍胃口出上焦之後此所受氣者泌糟粕蒸津液其化精㣲上注於肺脉乃化而為血以養生身莫貴於此故獨得行於經隧命曰營氣下焦者别四腸注扵膀胱而滲入焉故水糓者常并居于胃中成糟粕而俱下于大小腸而成下焦滲而俱下濟泌别汁循下焦而滲入膀胱焉謝氏曰詳靈樞本文則三焦有名無形尤可見矣古益袁氏曰所謂三焦者於膈膜脂膏之内五藏五府之隙水穀流化之闗其氣融㑹於其間熏蒸膈膜發達皮膚分肉運行四旁曰上中下各隨所屬部分而名之實元氣之别使也是故雖無其形倚内外之形而得其名雖無其實合内外之實而為位者也愚按其府在氣街一句疑錯簡或衍三焦自屬諸府其經為手少陽與手心主配且各有治所不應又有府也三十二難曰五藏俱等而心肺獨在鬲上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡營周於外故令心肺在鬲上也心榮肺衛通行經絡營周於外猶天道之運于上也鬲者隔也凡人心下有鬲膜與脊脇周囘相著所以遮隔濁氣不使上熏於心肺也四明陳氏曰此特言其位之高下耳若以五藏徳化論之則尤有說焉心肺既能以血氣生育人身則此身之父母也以父母之尊亦自然君于上矣内經曰鬲育之上中有父母此之謂也三十三難曰肝青象木肺白象金肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也然肝者非為純木也乙角也庚之柔一句大言隂與陽小言夫與婦釋其㣲陽而吸其㣲隂之氣其意樂金又行隂道多故令肝得水而沉也肺者非為純金也辛啇也丙之柔一句大言隂與陽小言夫與婦釋其㣲隂之氣婚而就火其意樂火又行陽道多故令肺得水而浮也肺熟而復沉肝熟而復浮者何也故知􅉝當歸庚乙當歸甲也四明陳氏曰肝屬甲乙未應角音而重濁析而言之則甲為木之陽乙為木之隂合而言之則皆陽也以其屬少陽而位於人身之隂分故為隂中之陽夫陽者必合隂甲乙之隂陽本自為配合而乙與庚通剛柔之道乙乃舍甲之㣲陽而反樂金故吸受庚金㣲隂之氣為之夫婦木之性本浮以其受金之氣而居隂道故得水而沉也及熟之則所受金之氣去乙復歸之甲而木之本體自然還浮也肺屬庚􅉝金應啇音而輕清析而言之則庚為金之陽􅉝為金之隂合而言之則皆隂也以其屬太隂而位于人身之陽分故為陽中之隂夫隂者必合陽庚辛之隂陽本自為配合而􅉝與丙通剛柔之道􅉝乃舍庚之㣲隂而反樂夫火故就丙火之陽為之夫婦金之性本沉以其受火之氣炎上而居陽道故得水而浮也又熟之則所受之氣乃去􅉝復歸之庚而金之本體自然還沉也古益袁氏曰肝為隂木乙也肺為隂金辛也角商各其音也乙與庚合丙與􅉝合猶夫婦也故皆暫舍其本性而隨夫之氣習以見隂陽相感之義焉况肝位鬲下肺居鬲上上陽下隂所行之道性隨而分故木浮而反肖金之沉金沉而反肖火之上行而浮也凢物極則反及其經制化變革則歸根復命焉是以肝肺熟而各肖其木金之本性矣紀氏曰肝為隂中之陽隂性尚多不隨於木故得水而沉也肺為陽中之隂陽性尚多不隨於金故得水而浮也此乃言其大者耳若言其小則乙庚丙􅉝夫婦之道也及其熟而沉浮反者各歸所屬是其本性故也周氏曰肝畜血血隂也多血少氣體凝中窒雖有脉絡内經非玲瓏空虚之比故得水而沉也及其熟也濡而潤者轉為乹燥凝而窒者變為通虚宜其浮也肺主氣氣陽也多氣少血體四垂而輕泛孔竅玲瓏脉絡旁達故得水而浮也熟則體皆揫歛孔竅窒寔輕紓者變而緊縮宜其沉也斯物理之當然與五行造化黙相符合耳謝氏曰此因物之性而推其理也愚謂肝為陽隂中之陽也隂性尚多故曰㣲陽其居在下行隂道也肺為隂陽中之隂也陽性尚多故曰微隂其居在上行陽道也熟則無所樂而反其本矣何也物熟而相交之氣散也三十四難曰五藏各有聲色臭味皆可曉知與否然十變言肝色青其臭臊其味酸其聲呼其液泣心色赤其臭焦其味苦其聲言其液汗脾色黄其臭香其味甘其聲歌其液涎肺色白其臭腥其味辛其聲哭其液涕腎色黒其臭腐其味醎其聲呻其液唾是五藏聲色臭味也此五藏之用也聲色臭味下欠液字肝色臭青臊木化也呼出木也味酸曲直作酸也液泣通乎目也心色赤臭焦火化也言揚火也味苦炎上作苦也液汗心主血汗為血之屬也脾色黄臭香土化也歌緩土也一云脾神好樂故其聲主歌甘稼穡作甘也液涎通乎口也肺色白臭腥金化也哭慘金也味辛從革作􅉝也液涕通乎鼻也腎色黒臭腐水化也呻吟誦也象水之聲味鹹潤下作鹹也液唾水之屬也四明陳氏曰腎位逺非伸之則氣不得及於息故聲之呻者自腎出也然肺主聲肝主色心主臭脾主味腎主液五藏錯綜互相有之故云十變也五藏有七神各何所藏耶然藏者人之神氣所舍藏也故肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志也藏者藏也人之神氣藏於内焉䰟者神明之輔弼也隨神徃来謂之魂魄者精氣之匡佐也並精而出入者謂之魄神者精氣之化成也兩精相薄謂之神脾主思故藏意與智腎者作强之官伎巧出焉故藏精與志也此因五藏之用而言五藏之神是故五用著於外七神藴于内也三十五難曰五藏各有所句皆府相近而心肺獨去大腸小腸逺者何也然經言心榮肺衛通行陽氣故居在上大腸小腸傳隂氣而下故居在下所以相去而逺也心榮肺衛行陽氣而居上大腸小腸傳隂氣而居下不得不相逺也又諸府者皆陽也清浄之處今大腸小腸胃與膀胱皆受不净其意何也又問諸府既皆陽也則當為清净之處何故大腸小腸胃與膀胱皆受不净耶然諸府者謂是非也經言小腸者受盛之府也大腸者傳寫行道之府也膽者清净之府也胃者水糓之府也膀胱者津液之府也一府猶無兩名故知非也小腸者心之府大腸者肺之府膽者肝之府胃者脾之府膀胱者腎之府謂諸府為清浄之處者其說非也今大腸小腸胃與膀胱各有受任則非陽之清净矣各為五藏之府固不得而兩名也葢諸府體為陽而用則隂經所謂濁隂歸六府是也云諸府皆陽清淨之處唯膽足以當之小腸謂赤腸大腸謂白腸膽者謂青腸胃者謂黄腸膀胱者謂黒腸下焦之所治也此以五藏之色分别五府而皆以腸名之也下焦所治一句屬膀胱謂膀胱當下焦所治主分别清濁也三十六難曰藏各有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者諸神精之所舍原氣之所繋也男子以藏精女子以繋胞故知腎有一也腎之有兩者以左者為腎右者為命門也男子於此而藏精受五藏六府之精而藏之也女子於此而繫胞是得精而能施化胞則受胎之所也原氣謂臍下腎間動氣人之生命十二經之根本也此篇言非皆腎也三十九難亦言左為腎右為命門而又云其氣與腎通是腎之兩者其實則一爾故項氏家說引沙隨程可乆曰北方常配二物故惟坎加習於物為龜為蛇於方為朔為北於大𤣥為㒺為㝠難經曰藏有一而腎獨兩此之謂也此通三十八三十九難諸篇前後參攷其義廼盡三十七難曰五藏之氣於何發起通於何許可曉與否然五藏者當上闗於九竅也故肺氣通於鼻鼻和則知香臭矣肝氣通於目目和則知黒白矣脾氣通於口口和則知糓味矣心氣通於舌舌和則知五味矣腎氣通於耳耳和則知五音矣謝氏曰本篇問五藏之氣於何發起通於何許答文止言五藏通九竅之義而不及五藏之發起恐有缺文愚按五藏發起當如二十三難流注之說上闗九竅靈樞作七竅者是下同五藏不和則九竅不通六府不和則畱結為癰此二句結上起下之辭五藏隂也隂不和則病於内六府陽也陽不和則病於外邪在六府則陽脉不和陽脉不和則氣畱之氣畱之則陽脉盛矣邪在五藏則隂脉不和隂脉不和則血畱之血畱之則隂脉盛矣隂氣太盛則陽氣不得相營也故曰格陽氣太盛則隂氣不得相營也故曰闗隂陽俱盛不得相營也故曰闗格闗格者不得盡其命而死矣此與靈樞十七篇文大同小異或云二十八難其受邪氣畜則腫熱砭射之也十二字當為此章之結語蓋隂陽之氣太盛而至於闗格者必死若但受邪氣畜則宜砭射之其者指物之辭因上文六府不和及邪在六府而言之也經言氣􅍦行於五藏不營於六府者何也然夫氣之所行也如水之流不得息也故隂脉營於五藏陽脉營於六府如環無端莫知其紀終而復始其不覆溢人氣内温於藏府外濡於腠理此因上章營字之意而推及之也亦與靈樞十七篇文大同小異所謂氣獨行於五藏不營於六府者非不營於六府也謂在隂經則營於五藏在陽經則營於六府脉氣周流如環無端則無闗格覆溢之患而人之氣内得以温於藏府外得以濡於腠理矣四明陳氏曰府有邪則陽脉盛藏有邪則隂脉盛隂脉盛者隂氣闗于下陽脉盛者陽氣格于上然而未至於死隂陽俱盛則既闗且格格則吐而食不下闗則二隂閉不得大小便而死矣藏府氣和而相營隂不覆陽不溢又何闗格之有三十八難曰藏惟有五府獨有六者何也然所以府有六者謂三焦也有原氣之别焉主持諸氣有名而無形其經屬手少陽此外府也故言府有六焉三焦主持諸氣為原氣别使者以原氣頼其導引潛行黙運于一身之中無或間斷也外府指其經為手少陽而言葢三焦外有經而内無形故云詳見六十六難三十九難曰經言府有五藏有六者何也然六府者正有五府也五藏亦有六藏者謂腎有兩藏也其左為腎右為命門命門者精神之所舍也男子以藏精女子以繫胞其氣與腎通故言藏有六也府有五者何也然五藏各一府三焦亦是一府然不屬於五藏故言府有五焉前篇言藏有五府有六此言府有五藏有六者以腎之有兩也腎之兩雖有左右命門之分其氣相連寔皆腎而已府有五者以三焦配合手心主也合諸篇而觀之謂五藏六府可也五藏五府亦可也六藏六府亦可也四十難曰經言肝主色心主臭脾主味肺主聲腎主液鼻者肺之候而反知香臭耳者腎之候而反聞聲其意何也然肺者西方金也金生於巳巳者南方火火者心心主臭故令鼻知香臭腎者北方水也水生於申申者西方金金者肺肺主聲故令耳聞聲四明陳氏曰臭者心所主鼻者肺之竅心之脉上肺故令鼻知香臭也耳者腎之竅聲者肺所主腎之脉上肺故令耳能聞聲也愚按越人此說葢以五行相生之次而言且見其相因而為用也四十一難曰肝獨有兩葉以何應也然肝者東方木也木者春也萬物始生其尚㓜小意無所親去太隂尚近離太陽不逺猶有兩心故有兩葉亦應木葉也四明陳氏曰五藏之相生母子之道也故腎為肝之母屬隂中之太隂心為肝之子屬陽中之太陽肝之位切近乎腎亦不逺乎心也愚謂肝有兩葉應東方之木木者春也萬物始生草木甲拆兩葉之義也越人偶有見於此而立為論說不必然不必不然也其曰太隂太陽固不必指藏氣及月令而言但隆冬為隂之極首夏為陽之盛謂之太隂太陽無不可也凡讀書要湏融活不可滯泥先儒所謂以意逆志是謂得之信矣後篇謂肝左三葉右四葉此云兩葉總其大者爾四十二難曰人腸胃長短受水糓多少各幾何然胃大一尺五寸徑五寸長二尺六寸横屈受水糓三斗五升其中常畱句糓二斗水一斗五升小腸大二寸半徑八分分之少半長三丈二尺受糓二斗四升水六升三合合之太半囘腸大四寸徑一寸半長二丈一尺受糓一斗水七升半廣腸大八寸徑二寸半長二尺八寸受糓九升三合八分合之一故腸胃凡長五丈八尺四寸合受水糓八斗七升六合八分合之一此腸胃長短受水穀之數也囘腸即大腸廣腸肚門之緫稱也肝重二斤四兩左三葉右四葉凡七葉主藏魂心重十二兩中有七孔三毛盛精汁三合主藏神脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血温五藏主藏意肺重三斤三兩六葉兩耳凡八葉主藏魂腎有兩枚重一斤二兩主藏志膽在肝之短葉間重三兩三銖盛精汁三合胃重二斤十四兩紆曲屈伸長二尺六寸大一尺五寸徑五寸盛糓二斗水一斗五升小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左囘疊積十六曲盛穀二斗四升水六升三合合之太半大腸重二斤十二兩長二丈一尺廣四寸徑一寸當臍右廻十六曲盛榖一斗水七升半膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半唇至齒長九分齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十二兩廣二寸半至胃長一尺六寸㗋嚨重十二兩廣二寸長一尺二寸九節肛門重十二兩大八寸徑二寸太半長二尺八寸受糓九升三合八分合之一此篇之義靈樞三十一三十二篇皆有之惟越人併為一篇而後叚増入五藏輕重所盛所藏雖覺前後重􅃨不害其為丁寧也但其間受盛之數各不相同然非大義之所闗姑闕之以俟知者四十三難曰人不食飲七日而死者何也然人胃中常有畱糓二斗水一斗五升故平人日再至圊一行二升半日中五升七日五七三斗五升而水糓盡矣故平人不食飲七日而死者水糓津液俱盡即死矣此篇與靈樞三十篇文大同小異平人胃滿則腸虚腸滿則胃虚更虚更滿故氣得上下五藏安定血脉和利精神乃居故神者水糓之精氣也平人不食飲七日而死者水榖津液皆盡也故曰水去則榮散榖消則衛亾榮散衛亾神無所依此之謂也四十四難曰七衝門何在然唇為飛門齒為戸門㑹厭為吸門胃為賁門太倉下口為幽門大腸小腸㑹為䦨門下極為魄門故曰七衝門也衝衝要之衝㑹厭為咽㗋嗌㑹合也厭猶掩也謂當咽物時合掩㗋嚨不使食物悞入以阻其氣之嘘吸出入也賁與奔同言物之所奔嚮也太倉下口胃之下口也在臍上二寸下脘之分大腸小腸㑹在臍上一寸水分穴下極肚門也云魄門亦取幽隂之義四十五難曰經言八㑹者何也然府㑹太倉藏㑹季脇筋㑹陽陵泉髓㑹絶骨血㑹膈俞骨㑹大杼脉㑹太淵氣㑹三焦外一筋直兩乳内也熱病在内者取其㑹之氣穴也太倉一名中脘在臍上四寸六府取禀於胃故為府㑹季脇期門穴也在大横外直齊季脇端為脾之募五藏取禀於脾故為藏㑹足少陽之筋結於膝外亷陽陵泉也在膝下一寸外亷陷中又膽與肝為配肝者筋之合故為筋㑹絶骨一名陽輔在足外踝上四寸輔骨前絶骨端如前三分諸髓皆屬於骨故為髓㑹鬲俞在背第七椎下去脊兩旁各一寸半足太陽脉氣所發也太陽多血入血乃水之象故為血㑹大杼在項後第一椎下脊去西旁各一寸半大淵在掌後陷中動脉所謂寸口者脉之大㑹也氣㑹三焦外一筋直兩乳内即膻中為氣海者也在玊堂下一寸六分熱病在内者各視其所屬而取之㑹也謝氏曰三焦當作上焦四明陳氏曰髓㑹絶骨髓屬於腎腎主骨於足少陽無所闗腦為髓海腦有枕骨宂則當㑹枕骨絶骨誤也血㑹鬲俞血者心所統肝所藏鬲俞在七椎下兩旁上則心俞下則肝俞故為血㑹骨㑹大杼骨者髓所養髓自腦下注於大杼滲入脊心下貫尾􅀈滲諸骨節故骨之氣皆㑹於此亦通古益袁氏曰人能徤歩以髓㑹絶骨也肩能任重以骨㑹大杼也四十六難曰老人寤而不寐少壯寐而不寤者何也然經言少壯者血氣盛􅡌肉滑氣道通榮衛之行不失於常故晝日精夜不寤也老人血氣衰􅡌肉不滑榮衛之道濇故晝日不能精夜不得寐也故知老人不得寐也老人之卧而不寐少壯之寐而不寤係乎榮衛血氣之有餘不足也與靈樞十八篇同四十七難曰人面獨能耐寒者何也然人頭者諸陽之㑹也諸隂脉皆至頸胸中而還獨諸陽脉皆上至頭耳故令面耐寒也靈樞第四篇曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不衣何也岐伯曰十二經脉三百六十五絡其血氣皆上于面而走空竅其精陽氣上走于目而為睛其别氣上走于耳而為聽其宗氣上出于鼻而為臭其濁氣出於胃走唇口而為味其氣之津液皆上煄於面而皮又厚其肉堅故大熱甚寒不能勝之也愚按手之三陽從手上走至頭足之三陽從頭下走至足手之三隂從腹走至手足之三隂從足走入腹此所謂諸隂脉皆至頸胸中而還􅍦諸陽脉皆至上頭耳也四十八難曰人有三虚三實何謂也然有脉之虚實有病之虚實有診之虚實也脉之虚實者濡者為虚緊牢者為實病之虚實者出者為虚入者為實言者為虚不言者為實緩者為虚急者為實診之虚實者濡者為虚牢者為實痒者為虚痛者為實外痛内快為外實内虚内痛外快為内實外虚故曰虚實也濡者為虚緊牢者為實此脉之虚實也出者為虚是五藏自病由内而之外東垣家所謂内傷是也入者為實是五邪所傷由外而之内東垣家所謂外傷是也言者為虚以五藏自病不由外邪故惶惶而不妨於言也不言者為實以人之邪氣内欝故昬亂而不言也緩者為虚緩不急也言内之出者徐徐而遲非一朝一夕之病也急者為實言外邪所中風寒温熱等病死生在五六日之間也此病之虚實也診按也候也按其外而知之非診脉之診也濡者為虚牢者為實脉經無此二句謝氏以為衍文楊氏謂按之皮肉柔濡者為虚牢强者為實然則有亦無害夫按病者之處所知痛者為實則知不痛而痒者非實矣又知外痛内快為邪盛之在外内痛外快為邪盛之在内矣大抵邪氣盛則實精氣奪則虚此診之虚實也四十九難曰有正經自病有五邪所傷何以别之然憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆上而不下則傷肝飲食勞倦則傷脾乆坐濕地强力入水則傷腎是正經之自病也心主思慮君主之官也故憂愁思慮則傷心肺主皮毛而在上是為嫩藏故形寒飲冷則傷肺肝主怒怒則傷肝脾主飲食及四肢故飲食勞倦則傷脾腎主骨而屬水故用力作强坐濕入水則傷腎此盖憂思恚怒飲食動作之過而致然也夫憂思恚怒飲食動作人之所不能無者發而中節烏能為害過則傷人必矣故善養生者去太去甚適其中而已昧者拘焉乃欲一切拒絶之豈理也哉此與靈樞第四篇文大同小異但傷脾一節作若醉入房汗出當風則傷脾不同爾謝氏曰飲食勞倦自是二事飲食得失饑飽失時勞倦者勞形力而致倦怠也此本經自病者病由内作非外邪之干所謂内傷者也或曰坐濕入水亦從外得之也何為正經自病曰此非天之六淫也何謂五邪然有中風有傷暑有飲食勞倦有傷寒有中濕此之謂五邪風木也喜傷肝暑火也喜傷心土爰稼穡脾主四肢故飲食勞倦喜傷脾寒金氣也喜傷肺左氏傳狐突云金寒是也濕水也喜傷腎霧雨蒸氣之類也此五者邪由外至所謂外傷者也謝氏曰脾胃正經之病得之勞倦五邪之傷得之飲食假令心病何以知中風得之然其色當赤何以言之肝主色自入為青入心為赤入脾為黄入肺為白入腎為黒肝為心邪故知當赤色其病身熱脇下滿痛其脉浮大而弦此以心經一部設假令而發其例也肝主色肝為心邪故色赤身熱脉浮大心也脇痛脉弦肝也何以知傷暑得之然當惡臭何以言之心主臭自入為焦臭入脾為香臭入肝為臊臭入腎為腐臭入肺為腥臭故知心病傷暑得之當惡臭其病身熱而煩心痛其脉浮大而散心主臭心傷暑而自病故惡臭而證狀脉診皆屬乎心也何以知飲食勞倦得之然當喜苦味也虚為不欲食實為欲食何以言之脾主味入肝為酸入心為苦入肺為􅉝入腎為鹹自入為甘故知脾邪入心為喜苦味也其病身熱而體重嗜卧四肢不收其脉浮大而緩脾主味脾為心邪故喜苦味身熱脉浮大心也體重嗜卧四肢不收脉緩脾也虚為不欲食實為欲食二句於上下文無所發疑錯蕳衍文也何以知傷寒得之然當譫言妄語何以言之肺主聲入肝為呼入心為言入脾為歌入腎為呻自入為哭故知肺邪入心為譫言妄語也其病身熱洒洒惡寒甚則喘咳其脉浮大而濇肺主聲肺為心邪故譫言妄語身熱脉浮大心也惡寒喘咳濇肺也何以知中濕得之然當喜汗出不可止何以言之腎主濕入肝為泣入心為汗入脾為涎入肺為涕自入為唾故知腎邪入心為汗出不可止也其病身熱而小腹痛足脛寒而逆其脉沉濡而大此五邪之法也腎主濕濕化五液腎為心邪故汗出不可止身熱脉大心也小腹痛足脛寒脉沉濡腎也凡隂陽藏府經絡之氣虚實相等正也偏虚偏實失其正也失其正則為邪矣此篇越人葢言隂陽藏府經絡之偏虚偏實者也由偏實也故内邪得而生由偏虚也故外邪得而入五十難曰病有虚邪有實邪有賊邪有㣲邪有正邪何以别之然從後來者為虚邪從前來者為實邪從所不勝來者為賊邪從所勝來者為㣲邪自病者為正邪五行之道生我者休其氣虚也居吾之後而來為邪故曰虚邪我生者相氣方實也居吾之前而來為邪故曰實邪正邪則本經自病者也何以言之假令心病中風得之為虚邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為㣲邪中濕得之為賊邪假心為例以發明上文之義中風為虚邪從後而來大前木後也傷暑為正邪火自病也飲食勞倦為實邪從前而來土前火後也傷寒為㣲邪從所勝而來火勝金也中濕為賊邪從所不勝而來水剋火也與上篇互相發宜通攷之五十一難曰病有欲得温者有欲得寒者有欲得見人者有不欲得見人者而各不同病在何藏府也然病欲得寒而欲見人者病在府也病欲得温而不欲見人者病在藏也何以言之府者陽也陽病欲得寒又欲見人藏者隂也隂病欲得温又欲閉戸獨處惡聞人聲故以别知藏府之病也紀氏曰府為陽陽病則熱有餘而寒不足故飲食衣服居處皆欲就寒也陽主動而應乎外故欲得見人藏為隂隂病則寒有餘而熱不足故飲食衣服居處皆欲就温也隂主靜而應乎内故欲閉戸獨處而惡聞人聲也五十二難曰府藏發病根本不等其不等也奈何然藏病者止而不移其病不離其處府病者彷彿賁嚮上下行流居處無常故以此知藏府根本不同也丁氏曰藏為隂隂主靜故止而不移府為陽陽主動故上下流行居處無常也與五十五難文義互相發五十三難曰經言七傳者死間藏者生何謂也然七傳者傳其所勝也間藏者傳其子也何以言之假令心病傳肺肺傳肝肝傳脾脾傳腎腎傳心一藏不再傷故言七傳者死也有圖紀氏曰心火傳肺金肺金傳肝木肝木傳脾土脾土傳腎水腎水傳心火心火受水之傳一也肺金復受火之傳再也自心而始以次相傳至肺之再是七傳也故七傳死者一藏不受再傷也假令心病傳脾脾傳肺肺傳腎腎傳肝肝傳心是子母相傳竟而復始如環無端故曰生也呂氏曰間藏者間其所勝之藏而相傳也心勝肺脾間之脾勝腎肺間之腎勝心肝間之肝勝脾心間之此謂傳其所生也按素問標本病傳論曰謹察間甚以意調之問者并行甚者獨行盖并者竝也相並而傳傳其所間如吕氏之說是也獨者特也特傳其所勝如紀氏之說是也越人之義葢本諸此詳見本篇及靈樞四十二篇但二經之義則以五藏與胃勝七者相傳發其例而其篇題皆以病傳為名今越人則以七傳間藏之目推明二經假心為例以見病之相傳若傳所勝至一藏再傷則死若間其所勝是子母相傳則生也尤簡而明五十四難曰藏病難治府病易治何謂也然藏病所以難治者傳其所勝也府病易治者傳其子也與七傳間藏同法也四明陳氏曰五藏者七神内守則邪之㣲者不易傳若火氣入之則神亦失守而病深故病難治亦或至于死矣六府為轉輸傳化者其氣常通况膽又清净之處雖邪入之終難深留故府病易治也愚按以越人之意推之則藏病難治者以傳其所勝也府病易治者以傳其所主也雖然此特各舉其一偏而言爾若藏病傳其所生亦易治府病傳其所勝亦難治也故龎安常云世之醫書惟扁鵲之言為深所謂難經者也越人寓術於其書而言之有不詳者使後人自求之歟今以此篇詳之龎氏可謂得越人之心者矣五十五難曰病有積有聚何以别之然積者隂氣也聚者陽氣也故隂沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五藏所生聚者六府所成也積者隂氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所畱止其痛無常處謂之聚故以是别知積聚也積者五藏所生五藏屬隂隂主靜故其病沉伏而不離其處聚者六府所成六府屬陽陽主動故其病浮動而無所畱止也楊氏曰積蓄也言血脉不行蓄積而成病也周仲立曰隂沉而伏初亦未覺漸以滋長日積月累是也聚者病之所在與血氣偶然邂逅故無常處也與五十二難意同五十六難曰五藏之積各有名乎以何月何日得之然肝之積名曰肥氣在左脇下如覆杯有頭足乆不愈令人發咳逆㾬瘧連歲不已以季夏戊巳日得之何以言之肺傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故畱結為積故知肥氣以季夏戊巳日得之肥之言盛也有頭足者有大小本末也咳逆者足厥隂之别貫膈上注肺肝病故胸中欬而逆也二日一發為㾬瘧内經五藏皆有瘧此在肝為風瘧也抑以瘧為寒熱病多屬少陽肝與之為表裏故云左脇肝之部也心之積名曰伏梁起臍上大如臂上至心下乆不愈令人病煩心以秋庚辛日得之何以言之腎病傳心心當傳肺肺以秋適王王者不受邪心復欲還腎腎不肯受故畱結為積故知伏梁以秋庚辛日得之伏梁伏而不動如梁木然脾之積名曰痞氣在胃脘覆大如盤乆不愈令人四肢不收黄發疸飲食不為肌膚以冬壬癸日得之何以言之肝病傳脾脾當傳腎腎以冬適王王者不受邪脾復欲還肺肝不肯受故留結為積故知痞氣以冬壬癸日得之痞氣痞塞而不通也疸病發黄也濕熱為疸肺之積名曰息賁在右脇下覆大如杯乆不已令人洒淅寒熱喘欬發肺鬰以春甲乙日得之何以言之心病傳肺肺當傳肝肝以春適王王者不受邪肺復欲還心心不肯受故畱結為積故知息賁以春甲乙日得之息賁或息或賁也右脇肺之部肺主皮毛故洒浙寒熱或謂藏病止而不移今肺積或息或賁何也然或息或賁非居處無常如府病也特以肺主氣故其病有時而動息爾腎亦主氣故賁豚亦然腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時乆不已令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎當傳心心以夏適王王者不受邪腎復欲還脾脾不肯受故畱結為積故知賁豚以夏丙丁日得之此五積之要法也賁豚言若豚之賁突不常定也豚性躁故以名之令人喘逆者足少隂之支從肺出絡心注胸中故也此難但言藏病而不言府病者紀氏謂以其發無常處也楊氏謂六府亦相傳行如五藏之傳也或問天下之物理有感有傳感者情也傳者氣也有情斯有感有氣斯有傳今夫五藏之積特以氣之所勝傳所不勝云爾至於王者不受邪是固然也若不勝者反欲返所勝所勝不納而畱結為積則是有情而為感矣且五藏在人身中各為一物猶耳司聽目司視各有所職而不能思非若人之感物則心為之主而乗氣機者也然則五藏果各能有情而感乎曰越人之意盖以五行之道推其理勢之所有者演而成文耳初不必論其情感亦不必論其還不還與其必然否也讀者但以所勝傳不勝及王者不受邪遂畱結為積觀之則不以辭害志而思過半矣或人問子言情感氣傳先儒之言則曰形交氣感是又氣能感矣於吾子之言何如曰先儒之說雖曰氣感由形交也形指人身而言所以感之之主也五十七難曰泄凡有幾皆有名否然泄凡有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重此五泄之目下文詳之胃泄者飲食不化色黄胃受病故食不化胃屬土故色黄脾泄者腹脹滿泄注食即嘔吐逆有聲無物為嘔有聲有物為吐脾受病故腹脹泄注食即嘔吐而上逆也大腸泄者食已窘迫大便色白腸鳴切痛食方已即窘迫欲利也白者金之色謝氏曰此腸寒之證也小腸泄者溲而便膿血少腹痛溲小便也便指大便而言溲而便膿血謂小便不悶大便不裏急後重也大瘕泄者裏急後重數至圊而不能便莖中痛此五泄之要法也瘕結也謂因有凝結而成者裏急謂腹内急迫後重謂肛門下墜惟其裏急後重故數至圊而不能便莖中痛者小便亦不利也謝氏謂小腸大瘕二泄今所謂痢疾也内經曰腸澼故下利赤白者灸小腸俞是也穴在第十六椎下兩傍各一寸五分累驗四明陳氏曰胃泄即飱泄也脾泄即濡泄也大腸泄即涸泄也小腸泄謂凡泄則小便先下而便血即血泄也大瘕泄即腸癖也五十八難曰傷寒有幾其脉有變否然傷寒有五有中風有傷寒有濕温有熱病有温病其所苦各不同變當作辨謂分别其脉也紀氏曰汗出惡風者謂之傷風無汗惡寒者謂之傷寒一身盡疼不可轉側者謂之濕温冬傷於寒至夏而發者謂之熱病非其時而有其氣一歲之中病多相佀者謂之温病中風之脉陽浮而滑隂濡而弱濕温之脉陽濡而弱隂小而急傷寒之脉隂陽俱盛而緊濇熱病之脉隂陽俱浮浮之而滑沉之散濇温病之脉行在諸經不知何經之動也各隨其經所在而取之上文言傷寒之目此言其脉之辨也隂陽字皆指尺寸而言楊氏曰温病乃是疫癘之氣非冬感於寒春變為温病者散行諸經故不可預知臨病人而診之在何經之動乃隨而治之謝氏曰仲景傷寒例云冬時嚴寒萬類收藏君子周宻則不傷於寒觸冐者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為温病至夏變為暑病暑病者熱極重於温也又曰陽脉浮滑隂脉濡弱更遇於風變為風温今按仲景例風温與難經中風浮同而無温緼之說又曰難經言温病即仲景傷寒例中所言温瘧風温温毒温疫四温病也越人言其慨而未詳仲景則發其秘而條其脉可謂詳矣龎安常傷寒總論云難經載五種傷寒言温病之脉行在諸經不知何經之動隨其經所在而取之據難經温病又是四種傷寒感異氣而變成者也所以王􅅩和云陽脉浮滑隂脉濡弱更遇於風變成風温陽脉洪數隂脉實大更遇濕熱變為温毒温毒為病最重也陽脉濡弱隂脉弦緊更遇濕氣變為濕温脉隂陽俱盛重感於寒變為温瘧斯乃同病異名同脉異經者也所謂隨其經所在而取之者此也龎氏此說雖不與難經同然亦自一義例但傷寒例言温疫而無濕温􅅩和言濕温而無温疫此亦異耳傷寒有汗出而愈下之而死者有汗出而死下之而愈者何也然陽虚隂盛汗出而愈下之即死陽盛隂虚汗出而死下之而愈受病為虚不受病者為盛唯其虚也是以邪凑之唯其盛也是以邪不入即外臺所謂表病裏和裏病表和之謂指傷寒傳變者而言之也表病裏和汗之可也而反下之表邪不除裏氣復奪矣裏病表和下之可也而反汗之裏邪不􅅲表氣復奪矣故云死所以然者汗能亾陽下能損隂也此隂陽字指表裏言之經曰誅伐無過命曰大惑此之謂歟寒熱之病候之如何也然皮寒熱者皮不可近席毛􅄠焦鼻藁不得汗肌寒熱者皮膚痛唇舌藁無汗骨寒熱者病無所安汗注不休齒本藁痛靈樞二十一篇曰皮寒熱者不可附席毛髪焦鼻藁腊不得汗取三陽之絡以補手大隂肌寒熱者肌痛毛􅄠焦而唇槁腊不得汗取三陽於下以去其血者補足太隂以出其汗骨寒熱者病無所安謂一身百脉無有是處也汗注不休齒本槁取其少隂闕之絡齒已槁死不治愚按此盖内傷之病因以類附之東垣内外傷辨其兆於此乎五十九難曰狂癲之病何以别之然狂疾之始發少卧而不飢自高賢也自辨智也自尊貴也妄笑好歌樂妄行不休是也癲疾始發意不樂僵仆直視其脉三部隂陽俱盛是也狂疾發於陽故其狀皆自有餘而主動癲疾發於隂故其狀皆自不足而主靜其脉三部隂陽俱盛者謂發於陽為狂則陽脉俱盛發於隂為癲則隂脉俱盛也按二十難中重陽者狂重隂者癲脫陽者見鬼脫隂者目盲四句當屬之此下重讀如再重之重去聲重陽重隂於以再明上文隂陽俱盛之意又推其極至脫陽脫隂則不止於重陽重隂矣盖隂氣而極陽之脫也鬼為幽隂之物故見之陽盛而極隂之脫也一水不勝五火故目肓四明陳氏曰氣并於陽則為重陽血并於隂則為重隂脫陽者見鬼氣不守也脫隂者目肓血不榮也狂癲之病靈樞二十一篇其論詳矣越人特舉其槩正龎氏所謂引而不發使後人自求之歟六十難曰頭心之病有厥痛有真痛何謂也然手三陽之脉受風寒伏畱而不去者則名厥頭痛詳見靈樞二十四篇厥逆也入連在腦者名真頭痛真頭痛其痛甚腦盡痛手足青至節死不治盖腦為髓海真氣之所聚卒不受邪受邪則死其五藏氣相干名厥心痛靈樞載厥心痛凢五胃心痛腎心痛脾心痛肝心痛肺心痛皆五藏邪氣相干也其痛甚但在心手足青者即名真心痛其真心痛者旦發夕死夕發旦死靈樞曰真心痛手足青至節心痛甚為真心痛又七十一篇曰少隂者心脉也心者五藏六府之大主也心為帝王精神之所舍其藏堅固邪不能容容之則傷心心傷則神去神去則死矣其真心痛者真字下當欠一頭字盖闕文也手足青之青當作清冷也六十一難曰經言望而知之謂之神聞而知之謂之聖問而知之謂之工切脉而知之謂之巧何謂也然望而知之者望見其五色以知其病素問五藏生成篇曰已見青如草滋者死黄如枳實者死黒如炲者死赤如衃血者死白如枯骨者死此五色之見死者也青如翠羽者生赤如雞冠者生黄如蠏腹者生白如豕膏者生黒如烏羽者生此五色之見生也生於心欲如以縞裹朱生於肺欲如以縞裹紅生於肝欲如以縞裹紺生於脾欲如以縞裹栝樓實生於腎欲如以縞裹紫此五藏主色之外榮也靈樞四十九篇曰青黒為痛黄赤為熱白為寒又曰赤色出於兩額大如拇指者病雖小瘉又卒死黒色出於庭庭者顔也大如拇指必不病而卒又七十四篇曰診血脉者多赤多熱多青多痛多黒為乆痺多黒多赤多青皆見者為寒熱身痛面色㣲黄齒垢黄爪甲上黄黄疸也又如驗産婦面赤舌青母活子死面青舌青沫出母死子活唇口俱青子母俱死之類也袁氏曰五藏之色見於面者各有部分以應相生相剋之候察之以知其病也聞而知之者聞其五音以别其病四明陳氏曰五藏有聲而聲有音肝聲呼音應角調而直音聲相應則無病角亂則病在肝心聲笑音應徴和而長音聲相應則無病徴亂則病在心脾聲歌音應宮大而和音聲相應則無病宮亂則病在脾肺聲哭音應商輕而勁音聲相應則無病商亂則病在肺腎聲呻音應羽沉而深音聲相應則無病羽亂則病在腎袁氏曰聞五藏五聲以應五音之清濁或互相勝負或其音嘶嗄之類别其病也此一節當於素問隂陽應象論金匱真言諸篇言五藏聲音及三十四難云云求之則聞其聲足以别其病也問而知之者問其所欲五味以知其病所起所在也靈樞六十三篇曰五味入口各有所走各有所病酸走筋多食之令人癃醎走血多食之令人渇辛走氣多食之令人洞心辛與氣俱行故辛入心而與汗俱出苦走骨多食之令人變嘔甘走肉多食之令人恱心恱音悶推此則知問其所欲五味以知其病之所起所在也袁氏曰問其所欲五味中偏嗜偏多食之物則知藏氣有偏勝偏絶之候也切脉而知之者診其寸口視其虚實以知其病病在何藏府也診寸口即第一難之義視虚實見六難并四十八難王氏脉法讃曰脉有三部尺寸及闗榮衛流行不失衡銓腎沉心洪肺浮肝弦此自常經不失銖分出入升降漏刻周旋水下二刻脉一周身旋復寸口虚實見焉此之謂也經言以外知之曰聖以内知之曰神此之謂也以外知之望聞以内知之問切也神㣲妙聖通明也又總結之言聖神則工巧在内矣六十二難曰藏井滎有五府獨有六者何謂也然府者陽也三焦行於諸陽故置一俞名曰原府有六者亦與三焦其一氣也藏之井滎有五謂井滎俞經合也府之井滎有六以三焦行於諸陽故又置一俞而名曰原所以府有六者與三焦共一氣也虞氏曰此篇疑有缺誤當與六十六難參攷六十三難曰十變言五藏六府滎合皆以井為始者何也然井者東方木也萬物之始生諸蚑行喘息蜎飛蠕動當生之物莫不以春生故歲數始於春月數始於甲故以井為始也十二經所出之穴皆謂之井而以為滎俞之始者以井主東方木木者春也萬物發生之始諸蚑者行喘者息息謂嘘吸氣也公孫洪傳作蚑行喙息義尤明白蜎者飛蠕者動皆蟲之屬凡當生之物皆以春而生是以歲之數則始於春日之數則始於甲人之滎合則始於井也馮氏曰井谷井之井泉源之所出也四明陳氏曰經穴之氣所生則自井始而澑滎注俞過經入合故以萬物及歲數日數之始為譬也六十四難曰十變又言隂井木陽井金隂滎火陽滎水隂俞土陽俞木隂經金陽經火隂合水陽合土有圖十二經起於井穴隂井為木故隂井木生隂滎火隂滎火生隂俞土隂俞土生隂經金隂經金生隂合水陽井為金故陽井金生陽滎水陽滎水生陽俞木陽俞木生陽經火陽經火生陽合土隂陽皆不同其意何也然是剛柔之事也隂井乙木陽井庚金陽井庚庚者乙之剛也隂井乙乙者庚之柔也乙為木故言隂井木也庚為金故言陽井金也餘皆倣此剛柔者即乙庚之相配也十干所以自乙庚而言者盖諸藏府穴皆始於井而隂脉之井始於乙木陽脉之井始於庚金故自乙庚而言剛柔之配而其餘五行之配皆倣此也丁氏曰剛柔者謂隂井木陽井金庚金為剛乙木為柔隂滎火陽滎水壬水為剛丁火為柔隂俞土陽俞木甲木為剛已土為柔隂經金陽經火丙火為剛辛金為柔隂合水陽合土戊土為剛癸水為柔盖五行之道相生者母子之義相剋相制者夫婦之類故夫道皆剛婦道皆柔自然之理也易曰分隂分陽迭用剛柔其是之謂歟六十五難曰經言所出為井所入為合其法奈何然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入藏故言所入為合也此以經穴流注之始終言也六十六難曰經言肺之原出於太淵心之原出于太陵肝之原出于太衝脾之原出于太白腎之原出于太谿少隂之原出于兊骨神門穴也膽之原出于丘墟胃之原出于衝陽三焦之原出于陽池膀胱之原出于京骨大腸之原出于合谷小腸之原出于腕骨肺之原太淵至腎之原太谿見靈樞第二篇其第二篇曰肺之俞太淵心之俞太陵肝之俞太衝脾之俞太白腎之俞太谿膀胱之俞束骨過于亰骨為原膽之俞臨泣過于丘墟為原胃之俞谷陷過於衝陽為原三焦之俞中渚過于陽池為原小腸之俞後豀過于腕骨為原大腸之俞三間過于合谷為原盖五藏隂經止以俞為原六府陽經既有俞仍别有原或曰靈樞以太陵為心之原難經亦然而又别以兊骨為少隂之原諸家鍼灸書並以太陵為手厥隂心主之俞以神門在掌後兊骨之端者為心經所注之俞似此不同者何也按靈樞七十一篇曰少隂無輸心不病乎岐伯曰其外經病而藏不病故獨取其經於掌後兊骨之端也其餘脉出入屈折其行之疾徐皆如手少隂心主之脉行也又第二篇曰心出於中衝澑扵勞宫注于太陵行於間使入于曲澤手少隂也按中衝以下並手心主經俞靈樞直指為手少隂而手少隂經俞不别載也又素問繆刺篇曰刺手心主少隂兊骨之端各一瘉立已又氣宂篇曰藏俞五十宂王氏註五藏俞惟有心包經井俞之穴而亦無心經井俞穴又七十九難曰假令心病瀉手心主俞補手心主井詳此前後各經文義則知手少隂與心主同治也十二經皆以俞為原者何也然五藏俞者三焦之所行氣之所畱止也三焦所行之俞為原者何也然臍下腎間動氣人之生命也十二經之根本也故名曰原三焦者原氣之别使也主通行三氣經歴於五藏六府原者三焦之尊號也故所止輙為原五藏六府之有病者皆取其原也十二經皆以俞為原者以十二經之俞皆係三焦所行氣所畱止之處也三焦所行之俞為原者以臍下腎間動氣乃人之生命十二經之根本三焦則為原氣之别使主通行上中下之三氣經歴於五藏六府也通行三氣即紀氏所謂下焦禀真元之氣即原氣也上逹至于中焦中焦受水穀精悍之氣化為榮衛榮衛之氣與真元之氣通行逹於上焦也所以原為三焦之尊號而所止輙為原猶警蹕所至稱行在所也五藏六府之有病者皆于是而取之宜哉六十七難曰五藏募皆在隂而俞在陽者何謂也然隂病行陽陽病行隂故令募在隂俞在陽募與俞五藏空宂之總名也在腹為隂則謂之募在背為陽則謂之俞募猶募結之募言經氣之聚於此也俞史扁鵲傳作輸猶委輸之輸言經氣由此而輸於彼也五藏募在腹肺之募中府二宂在胸部雲門下一寸乳上三筋間動脉陷中心之募巨闕一宂在鳩尾下一寸脾之募章門二宂在季脇下直臍肝之募期門二宂在不容兩旁各一寸五分腎之募亰門二穴在腰中季脇本五藏俞在背行足太陽之經肺俞在第三椎下心俞在五椎下肝俞在九椎下脾俞在十一椎下腎俞在十四椎下皆俠脊兩旁各一寸五分隂病行陽陽病行隂者隂陽經絡氣相交貫藏府腹背氣相通應所以隂病有時而行陽陽病有時而行隂也鍼法曰從陽引隂從隂引陽六十八難曰五藏六府皆有井滎俞經合皆何所主然經言所出為井所流為滎所注為俞所行為經所入為合井主心下滿滎主身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄此五藏六府井滎俞經合所主病也主主治也井谷井之井水源之所出也滎絶小水也井之源本㣲故所流尚小而為滎俞輸也注也自滎而注乃為俞也由俞而經過於此乃謂之經由經而入於所合謂之合合者㑹也靈樞第一篇曰五藏五俞五五二十五俞六府六俞六六三十六俞此俞字空穴之總名凡諸空穴皆可以言俞經脉十二絡脉十五凡二十七氣所行皆井滎俞經合之所係而所主病各不同井主心下滿肝木病也足厥隂之支從肝别貫鬲上注肺故井主心下滿滎主身熱心火病也俞主體重節痛脾土病也經主喘咳寒熱肺金病也合主逆氣而泄腎水病也謝氏曰此舉五藏之病各一端為例餘病可以類推而互取也不言六府者舉藏足以該之六十九難曰經言虚者補之實者瀉之不虚不實以經取之何謂也然虚者補其母實者瀉其子當先補之然後瀉之不虚不實以經取之者是正經自病生不中他邪也當自取其經故言以經取之靈樞第十篇載十二經皆有盛則瀉之虚則補之不盛不虚以經取之虚者補其母實者瀉其子子能令母實母能令子虚也假令肝病虗即補厥隂之合曲泉是也實則瀉厥隂之滎行間是也先補後瀉即後篇陽氣不足隂氣有餘當先補其陽而後瀉其隂之意然於此義不屬非闕誤即衍文也不實不虚以經取之者即四十九難憂愁思慮則傷心形寒飲冷則傷肺云云者盖正經之自病者也楊氏曰不實不虚是諸藏不相乘也故云自取其經七十難曰經言春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陽氣在下人氣亦在下故當深取之春夏之時陽氣浮而上人之氣亦然故刺之當淺欲其無太過也秋冬之時陽氣沉而下人氣亦然故刺之當深欲其無不及也經曰必先歲氣無伐天和此之謂也四明陳氏曰春氣在毛夏氣在皮秋氣在分肉冬氣在骨髓是淺深之應也春夏各致一隂秋冬各致一陽者何謂也然春夏温必致一隂者初下鍼沉之至腎肝之部得氣引持之隂也秋冬寒必致一陽者初内鍼淺而浮之至心肺之部得氣推内之陽也是謂春夏必致一隂秋冬必致一陽致取也春夏氣温必致一隂者春夏養陽之義也初下鍼即沈之至腎肝之部俟其得氣乃引鍼而提之以至於心肺之分所謂致一隂也秋冬氣寒必致一陽者秋冬養隂之義也初内鍼淺而浮之當心肺之部推鍼而内之以達於腎肝之分所謂致一陽也此篇致隂致陽之說越人特推其理有如是者耳凡用鍼補瀉自有所宜初不必以是相拘也七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然鍼陽者卧鍼而刺之刺隂者先以左手攝按所鍼滎俞之處氣散乃内鍼是謂刺榮無傷衛刺衛無傷榮也榮為隂衛為陽榮行脉中衛行脉外各有所淺深也用鍼之道亦然鍼陽必卧鍼而刺之者以陽氣輕浮過之恐傷於榮也刺隂者先以左手按所刺之宂良乆令氣散乃内鍼不然則傷衛氣也無毋通禁止辭七十二難曰經言能知迎隨之氣可令調之調氣之方必在隂陽何謂也然所謂迎隨者知榮衛之流行經脉之往來也隨其逆順而取之故曰迎隨迎隨之法補瀉之道也迎者迎而奪之隨者隨而濟之然必知榮衛之流行經脉之徃來榮衛流行經脉徃來其義一也知之而後可以視夫病之逆順隨其所當而為補瀉也四明陳氏曰迎者迎其氣之方來而未盛也以瀉之隨者隨其氣之方徃而未虛也以補之愚按迎隨有二有虚實迎隨有子母迎隨陳氏之說虗實迎隨也若七十九難所載子母迎隨也調氣之方必在隂陽者知其内外表裏隨其隂陽而調之故曰調氣之方必在隂陽在察也内為隂外為陽表為陽裏為隂察其病之在隂在陽而調之也楊氏曰調氣之方必在隂陽者隂虚陽實則補隂瀉陽陽虚隂實則補陽瀉隂或陽并於隂隂并於陽或隂陽俱虚俱實皆隨其所見而調之謝氏曰男外女内表陽裏隂調隂陽之氣者如從陽引隂從隂引陽陽病治隂隂病治陽之類七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也滎者火也火者木之子當刺井者以滎瀉之故經言補者不可以為瀉瀉者不可以為補此之謂也諸經之井皆在手足指補肌肉淺薄之處氣少不足使為補瀉也故設當刺井者只瀉其榮以井為木滎為火火者木之子也詳越人此說專為瀉井者言也若當補井則必補其合故引經言補者不可以為瀉瀉者不可以為補各有攸當也補瀉反則病益篤而有實實虚虚之患可不謹歟七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺滎者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎滎俞之繫四時者以其邪各有所在也其肝心脾肺腎而繫於春夏秋冬者何也然五藏一病轍有五也假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也四時有數而並繫於春夏秋冬者也鍼之要妙在於秋毫者也五藏一病不止於五其病尤衆多也雖其衆多而四時有數故並繫於春夏秋冬及井滎俞經合之屬也用鍼者必精察之詳此篇文義似有缺誤今且依此解之以俟知者七十五難曰經言東方實西方虚瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虗瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虚故瀉火補水欲令金不得平木也經曰不能治其虚何問其餘此之謂也有圖金不得平木不字疑衍東方實西方虚瀉南方補北方者木金火水欲更相平也木火土金水之欲實五行之貪勝而務權也金木水火主之相平以五行所勝而制其貪也經曰一藏不平所不勝平之東方肝也西方肺也東方實則知西方虚矣若西方不虚則東方安得而過於實邪或瀉或補要亦抑其甚而濟其不足損過就中之道也水能勝火子能令母實母能令子虚瀉南方火者奪子之氣使食母之有餘補北方水者益子之氣使不食於母也如此則過者退而抑者進金得平其木而東西二方無復偏勝偏虧之患矣越人之意大抵謂東方過於實而西方之氣不足故瀉火以抑其木補水以濟其金是乃使金得與木相停故曰欲令金得平木也若曰欲令金不得平木則前後文義窒碍竟說不通使肝木不過肺不虚復瀉火補水不幾于實實虚虚耶八十一難文義正與此互相發明九峯蔡氏謂水火金木土穀惟修取相勝以淺其過其意亦同故結句云不能治其虚何問其餘盖為知常而不知變者之戒也此篇大意在肝實肺虗瀉火補水上或問子能令母實母能令子虚當瀉火補土為是盖子有餘則不食母之氣母不足則不能䕃其子瀉南方火乃奪子之氣使食母之有餘補中央土則益母之氣使得以䕃其子也今乃瀉火補水何歟曰此越人之妙一舉而兩得之者也且瀉火一則以奪木之氣一則以去金之克補水一則以益金之氣一則以制火之光若補土則一於助金而已不可施於兩用此所以不補土而補水也或又問母能令子實子能令母虚五行之道也今越人乃謂子能令母實母能令子虚何哉曰是各有其說也母能令子實子能令母虚者五行之生化子能令母實母能令子虚者鍼家之與奪固不相侔也四明陳氏曰仲景云木行乘金名曰横内經曰氣有餘則制已所勝而侮所不勝木實金虚是木横而􅇒金侮所不勝也木實本以金平之然其氣正强而横金平之則兩不相伏而戰戰則實者亦傷虗者亦敗金虚本資氣於土然其時土亦受制未足以資之故取水為金之子又為木之母於是瀉火補水使水勝火則火餒而取氣於木木乃减而不復實水為木母此母能令子虚也木既不實其氣乃平平則金免木􅇒而不復虚水為金子此子能令母實也所謂金不得平木不得徑以金平其木必瀉火補水而旁治之使金木之氣自然兩平耳今按陳氏此說亦自有理但為不之一字所纒未免牽强費辭不若直以不字為衍文爾觀八十一篇中當知金平木一語可見矣七十六難曰何謂補瀉當補之時何所取氣當瀉之時何所置氣然當補之時從衛取氣當瀉之時從榮置氣其陽氣不足隂氣有餘當先補其陽而後瀉其隂隂氣不足陽氣有餘當先補其隂而後瀉其陽榮衛通行此其要也靈樞五十二篇曰浮氣之不循經者為衛氣其精氣之行於經者為榮氣盖補則取浮氣之不循經者以補虚瀉則從榮置其氣而不用也置猶棄置之置然人之病虚實不一補瀉之道亦非一也是以陽氣不足而隂氣有餘則先補陽而後瀉隂以和之隂氣不足而陽氣有餘則先補隂而後瀉陽以和之如此則榮衛自然通行矣補瀉法見下篇七十七難曰經言上工治未病中工治已病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉中工者見肝之病不曉相傳但一心治肝故曰治已病也見肝之病先實其脾使邪無所入治未病也是為上工見肝之病一心治肝治已病也是為中工靈樞五十五篇曰上工刺其未生也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與其形之盛者也與其病之與服相逆者也故曰方其盛也勿毁傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也七十八難曰鍼有補瀉何謂也然補瀉之法非必呼吸出内鍼也知為鍼者信其左不知為鍼者信其右當刺之時先以左手厭按所鍼滎俞之處彈而努之爪而下之其氣之來如動脉之狀順鍼而刺之得氣因推而内之是謂補動而伸之是謂瀉不得氣乃與男外女内不得氣是謂十死不治也彈而努之鼔勇之也努讀若怒爪而下之搯之稍重皆欲致其氣之至也氣至指下如動脉之狀乃乘其至而刺之順猶循也乘也停鍼待氣氣至鍼動是傳氣也因推鍼而内之是謂補動而伸之是謂瀉此越人心法非呼吸出内者也是固然也若停鍼候氣乆而不至乃與男子則淺其鍼而候之衛氣之分女子則深其鍼而候之榮氣之分如此而又不得氣是謂其病終不可治也篇中前後二氣字不同不可不辨前言氣之來如動脉狀未刺之前左手所候之氣也後言得氣不得氣鍼下所候之氣也此有兩節周仲立乃云凡候氣左手宜略重之候之不得乃與男則少輕其手於衛氣之分以候之女則重其手於榮氣之分以候之如此則既無前後之分又昧停氣之道尚何所据而為補瀉耶七十九難曰經言迎而奪之安得無虚隨而濟之安得無實虚之與實若得若失實之與虚若有若無何謂也出靈樞第一篇得求而獲也失縱也遺也其第二篇曰言實與虚若有若無者謂實者有氣虚者無氣也言虚與實若得若失者謂補者佖然若有得也瀉者怳然若有失也亦第一篇之義然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主俞是謂迎而奪之者也補手心主井是謂隨而濟之者也迎而奪之者瀉也隨而濟之者補也假令心病心火也土為火之子與心主之俞太陵也實則瀉之是迎而奪之也木者火之母手心主之井中衝也虚則補之是隨而濟之也迎者迎於前隨者隨其後此假心為例而補瀉則云手心主即靈樞所謂少隂無俞者也當與六十六難並觀所謂實之與虚者牢濡之意也氣來實牢者為得濡虚者為失故曰若得若失也氣來實牢濡虚以隨濟迎奪而為得失也前云虚之與實若得若失實之與虚若有若無此言實之與虚若得若失盖得失有無義實相同互舉之省文爾八十難曰經言有見如入有見如出者何謂也然所謂有見如入者謂左手見氣來至乃内鍼鍼入見氣盡乃出鍼是謂有見如入有見如出也所謂有見如入下當欠有見如出四字如讀若而孟子書望道而末之見而讀若如盖通用也有見而入出者謂左手按宂待氣來至乃不鍼鍼入候其氣應盡而出鍼也八十一難曰經言無實實虚虚損不足而益有餘是寸口脉耶將病自有虚實耶其損益奈何然是病非謂寸口脉也謂病自有虚實也假令肝實而肺虚肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虚㣲少氣用鍼不補其肝而反重實其肺故曰實實虚虗損不足而益有餘此者中工之所害也是病二字非誤即衍肝實肺虚金當平木如七十五難之說若肺實肝虚則當抑金而抉木也用鍼者乃不補其肝而反重實其肺此所謂實其實而虚其虚損不足而益有餘殺人多矣中工中常之工猶云粗工也按難經八十一篇篇辭甚簡然而榮衛度數尺寸位置隂陽王相藏府内外脉法病能經絡流注鍼刺俞宂莫不該盡而此篇尤創艾切切盖不獨為用鍼者之戒凢為治者皆所當戒又絶筆之㣲意也於乎越人當先秦戰國時與内經靈樞之出不逺必有得以口授面命傳聞􅁮曄者故其見之明而言之詳不但如史家所載長桑君之遇也邵肍乃謂經之當難者未必止此八十一條噫猶有望於後人歟難經本義卷下
