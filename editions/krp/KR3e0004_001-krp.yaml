body:
  text: 難經本義卷上元滑夀撰一難曰十二經皆有動脈獨取寸口以決五藏六府死生吉㐫之法何謂也十二經謂手足三隂三陽合為十二經也手經則太隂肺陽眀大腸少隂心太陽小腸厥隂心包少陽三焦也足經則太隂脾陽眀胃少隂腎太陽膀胱厥隂肝少陽膽也皆有動脈者如手太隂脈動中府雲門天府俠白手陽眀脈動合谷陽谿手少隂脈動極泉手太陽脈動天窻手厥隂脈動勞宫手少陽脈動禾窌足太隂脈動箕門衝門足陽眀脈動衝陽大迎人迎氣衝足少隂脈動太谿隂谷足太陽脈動委中足厥隂脈動太沖五里隂㢘足少陽脈動下闗聽㑹之類也謂之經者以榮衛之流行經常不息者而言謂之脈者以血氣之分袤行體者而言也故經者徑也脈者陌也越人之意盖謂凡此十二經經皆有動脈如上文所云者今置不取乃獨取寸口以決藏府死生吉㐫何耶然寸口者脈之太㑹手太隂之脈動也然者答辭諸篇倣此此一篇之大指下文乃詳言之寸口謂氣口也居手太隂魚際却行一寸之分氣口之下曰闗曰尺云者皆手太隂所厯之處而手太隂又為百脈流注朝㑹之始也五藏别論帝曰氣口何以獨為五藏主岐伯曰胃者水穀之海六府之大源也五味入口藏於胃以養五藏氣而變見於氣口也靈樞第一篇云脈㑹太淵玉版論云行奇恒之法自太隂始注謂先以氣口太隂之脈定四時之正氣然後度量奇恒之氣也經脈别論云肺朝百脈又云氣口成寸以決死生合數論而觀之信知寸口當手太隂之部而為脈之大㑹眀矣此越人立問之意所以獨取夫寸口而後世宗之為不易之法著之篇首乃開卷第一義也學者詳之人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於身漏水下百刻榮衛行陽二十五度行隂亦二十五度為一周也故五十度復㑹於手太隂寸口者五藏六府之所終始故法取於寸口也承上文言人謂平人不病而息數匀者也呼者氣之出陽也吸者氣之入隂也内經平人氣象論云人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息命曰平人故平人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸以呼吸之數言之一日一夜凡足萬三千五百息以脈行之數言之則五十度周於身而榮衛之行於陽者二十五度行於隂者亦二十五度出入隂陽叅交互注無少間斷五十度畢適當漏下百刻為一晬時又眀日之平旦矣迺復㑹於手太隂此寸口所以為五藏六府之所終始而法有取於是焉盖以榮衛始於中焦注手太隂陽眀陽眀注足陽眀太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂計呼吸二百七十息脈行一十六丈二尺漏下二刻為一周身於是復還注手太隂積而盈之人一呼一吸為一息毎刻一百三十五息毎時八刻計一千八十息十二時九十六刻計一萬二千九百六十息刻之餘分得五百四十息合一萬三千五百息也一息脈行六寸毎二刻二百七十息脈行一十六丈二尺毎時八刻脈行六十四丈八尺榮衛四周於身十二時計九十六刻脈行七百七十七丈六尺為四十八周身刻之餘分行二周身得三十二丈四尺總之為五十度周身脈得八百一十丈也此呼吸之息脈行之數周身之度合晝夜百刻之詳也行陽行隂謂行晝行夜也二難曰脈有尺寸何謂也然尺寸者脈之大要㑹也尺說文云度名十寸也人手郤十分動脈為寸口十寸為尺䂓矩事也古者寸尺只尋常仭諸度量皆以人之體為法故以以象布指之状十分也人手郤一寸動脈謂之寸口従従一今按如說文所紀尤可見人體中脈之尺寸也尺隂分寸陽分也人之一身經絡榮衛五藏六府莫不由於隂陽而或過與不及於尺寸見焉故為脈之大要㑹也一難言寸口為脈之大㑹以肺朝百脈而言也此言尺寸為脈之大要㑹以隂陽對待而言也大抵手太隂之脈由中焦出行一路直至兩手大指之端其魚際郤行一寸九分通謂之寸口於一寸九分之中曰尺曰寸而闗在其中矣從闗至尺是尺内隂之所治也從闗至魚際是寸口内陽之所治也闗者掌後髙骨之分寸後尺前兩境之間隂陽之界限也従闗至尺澤謂之尺尺之内隂所治也従闗至魚際是寸口寸口之内陽所治也故孫思邈云従肘腕中横文至掌魚際後文却而十分之而入取九分是為尺此九分者自肘腕入至魚際為一尺十分之為十寸取第九分之一寸中為脈之尺位従魚際後文却還度取十分之一則是寸此寸字非寸闗尺之寸乃従肘腕横文至魚際却而取十分中之一是一寸也以此一寸之中取九分為脈之寸口故下文云寸十分之而入取九分之中則寸口也故分寸為尺分尺為寸寸為陽尺為隂陽上而隂下寸之下尺也尺之上寸也闗居其中以為限也分寸為尺分尺為寸此之謂歟分猶别也故隂得尺内一寸陽得寸内九分老隂之數終於十故隂得尺内之一寸此尺字指魚際至尺澤通計十寸者而言老陽之數極於九故陽得寸内之九分此寸字指入手郤寸而言尺寸終始一寸九分故曰尺寸也寸為尺之始尺為寸之終云尺寸者以終始對待而言其實貯寸得九分尺内一寸皆隂陽之盈數也龎安常云越人取手太隂之行度魚際後一寸九分以配隂陽之數盖謂此也三難曰脈有太過有不及有隂陽相乘有覆有溢有闗有格何謂也有圖太過不及病脈也闗格覆溢死脈也闗格之說素問六節藏象論及靈樞第九篇第四十九篇皆主氣口人迎以陽經取決於人迎隂經取決於氣口也今越人乃以闗前闗後言者以寸為陽而尺為隂也然闗之前者陽之動也脈當見九分而浮過者法曰太過減者法曰不及闗前為陽寸脈所動之位脈見九分而浮九陽數寸之位浮陽脈是其常也過謂過於本位過於常脈不及謂不及本位不及常脈是皆病脈也遂上魚為溢為外闗内格此隂乘之脈也遂者遂也徑行而直前也謝氏謂遂者直上直下殊無迴旋之生意有㫖哉經曰隂氣大盛則陽氣不得相營也以陽氣不得營於隂隂遂上出而溢於魚際之分為外闗内格也外闗内格謂陽外閉而不下隂従而内出以格拒之此隂乘陽位之脈也闗以後者隂之動也脈當見一寸而沈過者法曰太過減者法曰不及闗後為隂尺脈所動之位脈見一寸而沈一寸隂數尺之位沈隂脈是其常也過謂過於本位過於常脈不及謂不及本位不及常脈皆病脈也遂入尺為覆為内闗外格此陽乘之脈也經曰陽氣大盛則隂氣不得相營也以隂不得營於陽陽遂下陷而覆於尺之分為内闗外格也内闗外格謂隂内閉而不上陽従而外入以格拒之此陽乘隂位之脈也故曰覆溢覆如物之覆由上而傾於下也溢如水之溢由内而出乎外也是其真藏之脈人不病而死也覆溢之脈乃孤隂獨陽上下相離之診故曰真藏之脈謂無胃氣以和之也凡人得此脈雖不病猶死也此篇言隂陽之太過不及雖為病脈猶未至危殆若遂上魚入尺而為覆溢則死脈也此遂字最為切𦂳盖承上起下之要言不然則太過不及隂陽相乘闗格覆溢混為一意漫無輕重矣或問此篇之隂陽相乘與二十篇之說同異曰此篇乃隂陽相乘之極而為覆溢二十篇則隂陽更相乘而伏匿也更之一字與此篇遂字大有逕庭更者更互之更遂者直遂之遂而覆溢與伏匿又不能無辨盖覆溢為死脈伏匿為病脈固不可同日語也此書首三篇乃越人開卷第一義也一難言寸口統隂陽闗尺而言二難言尺寸以隂陽始終對待而言闗亦在其中矣三難言覆溢以隂陽闗格而言尤見闗為津要之所合而觀之三部之義備矣一二難言隂陽之常三難言隂陽之變四難曰脈有隂陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中呼出為陽吸入為隂心肺為陽肝腎為隂各以部位之髙下而應之也一呼再動心肺主之一吸再動腎肝主之呼吸定息脈五動閏以太息脾之候也故曰呼吸之間脾受穀味也其脈在中在中者在隂陽呼吸之中何則以脾受穀味灌溉諸藏諸藏皆受氣於脾土主中宫之義也浮者陽也沈者隂也故曰隂陽也浮為陽沈為隂此承上文而起下文之義心肺俱浮何以别之然浮而大散者心也浮而短濇者肺也腎肝俱沈何以别之然牢而長者肝也按之濡舉指来實者腎也脾者中州故其脈在中是隂陽之法也心肺俱浮而有别也心為陽中之陽故其脈浮而大散肺為陽中之隂其脈浮而短濇肝腎俱沈而有别也肝為隂中之陽其脈牢而長腎為隂中之隂其脈按之濡舉指来實古益袁氏謂腎屬水脈按之濡舉指来實外柔内剛水之象也脾說見前脈有一隂一陽一隂二陽一隂三陽有一陽一隂一陽二隂一陽三隂如此之言寸口有六脈俱動耶然此言者非有六脈俱動也謂浮沈長短滑濇也浮者陽也滑者陽也長者陽也沈者隂也短者隂也濇者隂也所謂一隂一陽者謂脈来沈而滑也一隂二陽者謂脈来沈滑而長也一隂三陽者謂脈来浮滑而長時一沈也所謂一陽一隂者謂脈来浮而濇也一陽二隂者謂脈来長而沈濇也一陽三隂者謂脈来沈濇而短時一浮也各以其經所在名病逆順也又設問答以眀隂陽脈見於三部者不單至也惟其不單至故有此六脈相兼而見浮者輕手得之長者過度本位滑者往来流利皆陽脈也沈者重手得之短者不及本位濇者往来凝滯皆隂脈也惟其相兼故有一隂一陽又一陽一隂如是之不一也夫脈之所至病之所在也以脈與病及經絡藏府叅之某為宜某為不宜四時相應不相應以名病之逆順也五難曰脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指来疾者腎部也故曰輕重也肺最居上主候皮毛故其脈如三菽之重心在肺下主血脈故其脈如六菽之重脾在心下主肌肉故其脈如九菽之重肝在脾下主筋故其脈如十二菽之重腎在肝下主骨故其脈按之至骨舉指来實腎不言菽以類推之當如十五菽之重今按此法以輕重言之即浮中沈之意也然於樞素無所見将古脈法而有所授受耶抑越人自得之見邪廬陵謝氏曰此寸闗尺所主藏府各有分位而一部之中脈自有輕重因舉陵陽虞氏說云假令左手寸口如三菽之重得之乃知肺氣之至如六菽之重得之知本經之至餘以類推之夫如是乃知五藏之氣更相溉灌六脈因兹亦有准繩可以定吉㓙言疾病矣闗尺皆然如十難中十變脈例而消息之也六難曰脈有隂盛陽虚陽盛隂虚何謂也然浮之損小沈之實大故曰隂盛陽虚沈之損小浮之實大故曰陽盛隂虚是隂陽虚實之意也浮沈以下指輕重言盛虚以隂陽盈虧言輕手取之而見減小重手取之而見實大知其為隂盛陽虚也重手取之而見損小輕手取之而見實大知其為陽盛隂虚也大扺輕手取之陽之分重手取之隂之分不拘何部率以是推之七難曰經言少陽之至乍大乍小乍短乍長陽眀之至浮大而短太陽之至洪大而長太隂之至𦂳大而長少隂之至𦂳細而微厥隂之至沈短而敦此六者是平脈耶将病脈耶然皆王脈也六者之王說見下文其氣以何月各王㡬日然冬至之後得甲子少陽王復得甲子陽眀王復得甲子太陽王復得甲子太隂王復得甲子少隂王復得甲子厥隂王王各六十日六六三百六十日以成一嵗此三陽三隂之王時日大要也上文言三陽三隂之王脈此言三陽三隂之王時當其時則見其脈也厯家之說以上古十一月甲子合朔冬至為厯元盖取夫氣朔之分齊也然天度之運與日月之行遲速不一嵗各有差越人所謂冬至之後得甲子亦以此歟是故氣朔之不齊節候之早晩不能常也故丁氏注謂冬至之後得甲子或在小寒之初或在大寒之後少陽之至始於此餘經各以次繼之紀氏亦謂自冬至之日一陽始生於冬至之後得甲子少陽脈王也若原其本始以十一月甲子朔合冬至常例推之則少陽之王便當従此日始至正月中餘經各以次繼之少陽之至陽氣尚微故其脈乍大乍小乍短乍長陽眀之至猶有隂也故其脈浮大而短太陽之至陽盛而極也故其脈洪大而長陽盛極則變而之隂矣故夏至後為三隂用事之始而太隂之至隂氣尚㣲故其脈来𦂳大長少隂之至隂漸盛也故其脈𦂳細而㣲厥隂之至隂盛而極也故其脈沈短而敦隂盛極則變而之陽仍三陽用事之始也此則三陽三隂之王脈所以周六甲而循四時率皆従㣲以至乎著自漸而趨於極各有其序也袁氏曰春温而夏暑秋涼而冬寒故人六經之脈亦隨四時隂陽消長迭運而至也劉温舒曰至真要論云厥隂之至其脈弦少隂之至其脈鈎太隂之至其脈沈少陽之至大而浮陽眀之至短而濇太陽之至大而長有隨天地之氣卷舒也如春弦夏洪秋毛冬石之類則五運六氣四時亦皆應之而見於脈爾若平人氣象論太陽脈至洪大而長少陽脈至乍數乍疎乍短乍長陽眀脈至浮大而短難經引之以論三陽三隂之脈者以隂陽始生之淺深而言之也篇首稱經言二字考之樞素無所見平人氣象論雖畧有其說而不詳豈越人之時别有所謂上古文字耶將内經有之而後世脫柬耶是不可知也後凡言經言而無所考者義皆倣此八難曰寸口脈平而死者何謂也然諸十二經脈者皆係於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五藏六府之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於内也腎間動氣人所得於天以生之氣也腎為子水位乎坎北方卦也乃天一之數而火木金土之先也所以為生氣之原諸經之根本又為守邪之神也原氣勝則邪不能侵原氣絶則死如木根絶而莖葉枯矣故寸口脈平而死者以生氣獨絶於内也此篇與第一難之說義若相悖然各有所指也一難以寸口決死生者謂寸口為脈之大㑹而穀氣之變見也此篇以原氣言也人之原氣盛則生原氣絶則寸口脈雖平猶死也原氣言其體穀氣言其用也九難曰何以别知藏府之病邪然數者府也遲者藏也數則為熱遲則為寒諸陽為熱諸隂為寒故以别知藏府之病也有圖凡人之脈一呼一吸為一息一息之間脈四至閏以太息脈五至命曰平人平人者不病之脈也其有増減則為病焉故一息三至曰遲不足之脈也一息六至曰數太過之脈也藏為隂府為陽脈數者属府為陽為熱脈遲者属藏為隂為寒不特是也諸陽脈皆為熱諸隂脈皆為寒藏府之病由是别之十難曰一脈為十變者何謂也然五邪剛柔相逢之意也假令心脈急甚者肝邪干心也心脈㣲急者膽邪干小腸也心脈大甚者心邪自干心也心脈㣲大者小腸邪自干小腸也心脈緩甚者脾邪干心也心脈㣲緩者胃邪干小腸也心脈濇甚者肺邪干心也心脈㣲濇者大腸邪干小腸也心脈沈其者腎邪干心也心脈㣲沈者膀胱邪干小腸也五藏各有剛柔邪故令一脈輒變為十也五邪者謂五藏五府之氣失其正而為邪者也剛柔者陽為剛隂為柔也剛柔相逢謂藏逢藏府逢府也五藏五府各有五邪以脈之来甚者属藏㣲者属府特以心藏發其例餘可類推故云一脈輒變為十也十一難曰經言脈不滿五十動而一止一藏無氣者何藏也然人吸者隨隂入呼者因陽出今吸不能至腎至肝而還故知一藏無氣者腎氣先盡也靈樞第五篇曰人一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣予之短期按五藏在下吸氣是逺若五十動不滿而一止者知腎無所資氣當先盡盡猶衰竭也衰竭則不能隨諸藏氣而上矣十二難曰經言五藏脈已絶於内用鍼者反實其外五藏脈已絶於外用鍼者反實其内内外之絶何以别之然五藏脈已絶於内者腎肝氣已絶於内也而醫反補其心肺五藏脈已絶於外者其心肺脈已絶於外也而醫反補其腎肝陽絶補隂隂絶補陽是謂實實虚虚損不足益有餘如此死者醫殺之耳靈樞第一篇曰凡将用鍼必先診脈視氣之劇易乃可以治之也又第三篇曰所謂五藏之氣已絶於内者脈口氣内絶不至反取其外之病處與陽經之合有留鍼以致陽氣陽氣至則内重竭重竭則死矣其死也無氣以動故静所謂五藏之氣已絶於外者脈口氣外絶不至反取其四末之輸有留鍼以致其隂氣隂氣至則陽氣反入入則逆逆則死矣其死也隂氣有餘故躁此靈樞以脈口内外言隂陽也越人以心肺腎肝内外别隂陽其理亦由是也紀氏謂此篇言鍼法馮氏玠謂此篇合入用鍼補瀉之類當在六十難之後以例相従也十三難曰經言見其色而不得其脈反得相勝之脈者即死得相生之脈者病即自巳色之與脈當叅相應為之奈何靈樞第四篇曰見其色知其病命曰眀按其脈知其病命曰神問其病知其處命曰工色脈形肉不得相失也色青者其脈弦赤者其脈鈎黄者其脈代白者其脈毛黒者其脈石見其色而不得其脈謂色脈之不相得也色脈既不相得看得何脈得相勝之脈即死得相生之脈病即自巳巳愈也叅合也然五藏有五色皆見於面亦當與寸口尺内相應假令色青其脈當弦而急色赤其脈浮大而散色黄其脈中緩而大色白其脈浮濇而短色黒其脈沈濡而滑此所謂五色之與脈當叅相應也色脈當叅相應夫如是則見其色得其脈矣脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈濇尺之皮膚亦濇脈滑尺之皮膚亦滑靈樞第四篇黄帝曰色脈已定别之奈何岐伯曰調其脈之緩急大小滑濇肉之堅脆而病變定矣黄帝曰調之奈何岐伯答曰脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈小尺之皮膚亦減而少氣脈大尺之皮膚亦賁而起脈滑尺之皮膚亦滑脈濇尺之皮膚亦濇凡此變者有㣲有甚故調尺者不待於寸善調脈者不待於色能叅合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六此通上文所謂色脈形肉不相失也五藏各有聲色臭味當與寸口尺内相應其不相應者病也假令色青其脈浮濇而短若大而緩為相勝浮大而散若小而滑為相生也若之為言或也舉色青為例以眀相勝相生也青者肝之色浮濇而短肺脈也為金尅木大而緩脾脈也為木尅土此相勝也浮大而散心脈也為木生火小而滑腎脈也為水生木此相生也此所謂得相勝之脈即死得相生之脈病即自已也經言知一為下工知二為中工知三為上工上工者十全九中工者十全七下工者十全六此之謂也說見前三謂色脈皮膚三者也此篇問答凡五節第一節為問辭第二第三節言色脈形肉不得相失第四節言五藏各有聲色臭味當與寸尺相應然假令以下但言色脈相叅不言聲臭味殆闕文歟抑色之著於外者将切於叅驗歟第五節則以所知之多寡為工之上下也十四難曰脈有損至何謂也然至之脈一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絶此至之脈也何謂損一呼一至曰離經再呼一至曰奪精三呼一至曰死四呼一至曰命絶此損之脈也至脈従下上損脈従上下也平人之脈一呼再至一吸再至呼吸定息脈四至加之則為過減之則不及過與不及所以為至為損焉離經者離其經常之度也奪精精氣衰奪也至脈従下而逆上由腎而之肺也損脈従上而行下由肺而之腎也謝氏曰平人一呼再至脈行三寸今一呼三至則脈行四寸半一息之間至九寸二十息之間一百八十丈比平人行逺過六十丈此至脈之離經也平人一呼脈二至行三寸今一呼一至只得一寸半二十息之間脈遲行六十丈此損脈之離經也若夫至脈之奪精一呼四至則一息之間行一尺二寸損脈之奪精二呼一至則一息之間行三寸其病人甚矣過此者死而命絶也損脈之為病奈何然一損損於皮毛皮聚而毛落二損損於血脈血脈虚少不能榮於五藏六府三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於牀反此者至於收病也従上下者骨痿不能起於牀者死従下上者皮聚而毛落者死至於收病也當作至脈之病也於收二字誤肺主皮毛心主血脈脾主脾肉肝主筋腎主骨各以所主而見其所損也反此為至脈之病者損脈従上下至脈則従下上也治損之法奈何然損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒温損其肝者緩其中損其腎者益其精此治損之法也肺主氣心主血脈腎主精各以其所損而調治之榮衛者血脈之所資也脾主受穀味故損其脾者調其飲食適其寒温如春夏食涼食冷秋冬食温食熱及衣服起居各當其時是也肝主血血虚則中不足一云肝主怒怒則傷肝故損其肝者緩其中經曰肝苦急急食甘以緩之緩者和也脈有一呼再至一吸再至有一呼三至一吸三至有一呼四至一吸四至有一呼五至一吸五至有一呼六至一吸六至有一呼一至一吸一至有再呼一至再吸一至有呼吸再至脈来如此何以别知其病也此再舉損至之脈為問答也盖前之損至以五藏自病得之於内者而言此則以經絡血氣為邪所中之㣲甚自外得之者而言也其曰呼吸再至即一呼一至一吸一至之謂疑衍文也然脈来一呼再至一吸再至不大不小曰平一呼三至一吸三至為適得病前大後小即頭痛目眩前小後大即胸滿短氣一呼四至一吸四至病欲甚脈洪大者苦煩滿沈細者腹中痛滑者傷熱濇者中霧露一呼五至一吸五至其人當困沈細夜加浮大晝加不大不小雖困可治其有小大者為難治一呼六至一吸六至為死脈也沈細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當着牀所以然者血氣皆不足故也再呼一至再吸一至呼吸再至此四字即前衍文名曰無魂無魂者當死也人雖能行名曰行尸一息四至是為平脈一呼三至一吸三至是一息之間脈六至比之平人多二至故曰適得病未甚也然又以前大後小前小後大而言病能也前後非言寸尺猶十五難前曲後居之前後以始末言也一呼四至一吸四至病欲甚矣故脈洪大者苦煩滿病在髙也沈細者腹中痛病在下也各以其病脈言之滑為傷熱者熱傷氣而不傷血血自有餘故脈滑也濇為中霧露者霧露之寒傷入榮血血受寒故脈濇也一呼五至一吸五至其人困矣若脈更見浮大沈細則各隨晝夜而加劇以浮大順晝陽也沈細順夜隂也若不見二者之脈人雖困猶可治小大即沈細浮大也一呼六至一吸六至増之極也故為死脈沈細夜死浮大晝死隂遇隂陽遇陽也一呼一至一吸一至名曰損以血氣皆不足也再呼一至再吸一至謂兩息之間脈再動減之極也經曰形氣有餘脈氣不足者死故曰無魂而當死也上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害所以然者譬如人之有尺樹之有根枝葉雖枯槁根本将自生脈有根本人有元氣故知不死譬如二字當在人之有尺下此又以脈之有無眀上下部之病也紀氏曰上部有脈下部無脈是邪實并於上即當吐也若無吐證為上無形而下氣竭故云當死東垣李氏曰下部無脈此木鬱也飲食過飽填塞於胸中太隂之分而春陽之令不得上行故也是為木鬱木鬱則達之謂吐之是也謝氏曰上部無脈下部有脈者隂氣盛而陽氣㣲故雖困無能為害上部無脈如樹枝之槁下部有脈如樹之有根惟其有根可以望其生也四眀陳氏曰至進也陽獨盛而至數多也損減也隂獨盛而至數少也至脈従下上謂無隂而陽獨行至於上則陽亦絶而死矣損脈従上下謂無陽而隂獨行至於下則隂亦盡而死矣一難言寸口以決藏府死生吉㓙謂氣口為五藏主也四難言脾受穀味其脈在中是五藏皆以胃為主其脈則主闗上也此難言人之有尺譬如樹之有根脈有根本人有元氣故知不死則以尺為主也此越人所以錯綜其義散見諸篇以見寸闗尺各有所歸重云十五難曰經言春脈弦夏脈鈎秋脈毛冬脈石是王脈耶將病脈也然弦鈎毛石者四時之脈也春脈弦者肝東方木也萬物始生未有枝葉故其脈之来濡弱而長故曰弦夏脈鈎者心南方火也萬物之所茂垂枝布葉皆下曲如鈎故其脈之来疾去遲故曰鈎秋脈毛者肺西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈之来輕虚以浮故曰毛冬脈石者腎北方水也萬物之所藏也盛冬之時水凝如石故其脈之来沈濡而滑故曰石此四時之脈也此内經平人氣象玉機真藏論叅錯其文而為篇也春脈弦者肝主筋應筋之象夏脈鈎者心主血脈應血脈来去之象秋脈毛者肺主皮毛冬脈石者腎主骨各應其象兼以時物之象取義也来疾去遲劉立之曰来者自骨肉之分而出於皮膚之際氣之升而上也去者自皮膚之際而還於骨肉之分氣之降而下也如有變奈何脈逆四時之謂變然春脈弦反者為病何謂反然其氣来實强是為太過病在外氣来虚㣲是謂不及病在内氣来厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而勁益强如新張弓弦曰死春脈㣲弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣為本夏脈鈎反者為病何謂反然其氣来實强是謂太過病在外氣来虚㣲是謂不及病在内其脈来累累如循琅玕曰平来而益數如雞舉足者曰病前曲後居如操帶鈎曰死夏脈㣲鈎曰平鈎多胃氣少曰病但鈎無胃氣曰死夏以胃氣為本秋脈毛反者為病何謂反然其氣来實强是謂太過病在外氣来虚㣲是謂不及病在内其脈来藹藹如車盖按之益大曰平不上不下如循雞羽曰病按之蕭索如風吹毛曰死秋脈㣲毛曰平毛多胃氣少曰病但毛無胃氣曰死秋以胃氣為本冬脈石反者為病何謂反然其氣来實强是謂太過病在外氣来虚㣲是謂不及病在内脈来上大下兊濡滑如雀之啄曰平啄啄連属其中㣲曲曰病来如解索去如彈石曰死冬脈㣲石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本春脈太過則令人善怒忽忽眩暈癲疾不及則令人胸痛引背下則兩脇胠滿夏脈太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄秋脈太過則令人逆氣而背痛愠愠然不及則令人喘呼吸少氣而欬上氣見血下聞病音冬脈太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如饑䏚中清脊中痛少腹滿小便赤此岐伯之言也越人之意盖本諸此變脈言氣者脈不自動氣使之然且主胃氣而言也循撫也按也春脈厭厭聶聶如循榆葉弦而和也益實而滑如循長竿弦多也急而勁益强如新張弓弦但弦也夏脈累累如環如循琅玕鈎而和也如雞舉足鈎多而有力也前曲後居謂按之堅而摶尋之實而据但鈎也秋脈藹藹如車盖按之益大㣲毛也不上不下如循雞羽毛多也按之蕭索如風吹毛但毛也冬脈上大下兊大小適均石而和也上下與来去同義見前篇啄啄連属其中㣲曲石多也来如解索去如彈石但石也大扺四時之脈皆以胃氣為本故有胃氣則生胃氣少則病無胃氣則死於弦鈎毛石中毎有和緩之體為胃氣也此篇與内經中互有異同馮氏曰越人欲使脈之易曉重立其義爾按内經第二卷平人氣象論篇云平肝脈来軟弱招招如掲長竿末梢平肺脈来厭厭聶聶如落榆莢平腎脈来喘喘累累如鈎按之而堅病腎脈来如引葛之益堅死腎脈如發奪索辟辟如彈石此為異也胃者水穀之海主稟四時皆以胃氣為本是謂四時之變病死生之要㑹也胃属土土之數五也萬物歸之故云水穀之海而水火金木無不待是以生故云主稟四時稟供也給也脾者中州也其平和不可見衰乃見耳来如雀之啄如水之下漏是脾衰見也脾者中州謂呼吸之間脾受穀味其脈在中也其平和不得見盖脾寄王於四季不得獨主於四時四藏之脈平和則脾脈在中矣衰乃見者雀啄屋漏異乎常也雀啄者脈至堅銳而斷續不定也屋漏者脈至緩散動而復止也十六難曰脈有三部九候有隂陽有輕重有六十首一脈變為四時離聖乆逺各自是其法何以别之謝氏曰此篇問三部九候以下共六件而本經並不答所問似有缺文今詳三部九候則十八難中第三章言之當属此篇錯柬在彼隂陽見四難輕重見五難一脈變為四時即十五難春弦夏鈎秋毛冬石也六十首按内經方盛衰篇曰聖人持診之道先後隂陽而持之奇恒之勢乃六十首王註謂奇恒六十首今世不存則失其傳者由来逺矣然是其病有内外證此盖答辭然與前問不相蒙當别有問辭也其病為之奈何問内外證之詳也然假令得肝脈其外證善潔面青善怒其内證臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也得肝脈診得肝脈也肝與膽合為清浄之府故善潔肝為将軍之官故善怒善猶喜好也面青肝之色也此外證之色脈情好也臍左肝之部也按之牢若痛謂其動氣按之堅牢而不移或痛也馮氏曰肝氣䐜鬱則四肢滿閉傳曰風淫末疾是也厥隂脈循隂器肝病故溲便難轉筋者肝主筋也此内證之部属及所主病也假令得心脈其外證面赤口乾喜笑其内證臍上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也掌中手心主脈所過之處盖真心不受邪受邪者手心主耳啘乾嘔也心病則火盛故啘經曰諸逆衝上皆属於火諸嘔吐酸皆属於熱假令得脾脈其外證面黄善噫善思善味其内證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜卧四支不收有是者脾也無是者非也靈樞口問篇曰噫者寒氣客於胃厥逆従下上散復出於胃故為噫經曰脾主四肢假令得肺脈其外證面白善嚏悲愁不樂欲哭其内證臍右有動氣按之牢若痛其病喘嗽咳洒浙寒熱有是者肺也無是者非也岐伯曰陽氣和利滿於心出於鼻故為嚏洒浙寒熱肺主皮毛也假令得腎脈其外證面黒善恐欠其内證臍下有動氣按之牢若痛其病逆氣小腹急痛泄如下重足脛寒而逆有是者腎也無是者非也腎氣不足則為恐隂陽相引則為欠泄而下重少隂泄也十七難曰經言病或有死或有不治自愈或連年月不已其死生存亡可切脈而知之耶然可盡知也此篇所問者三答云可盡知也而止答病之死證餘無所見當有闕漏診病若閉目不欲見人者脈當得肝脈强急而長而反得肺脈浮短而濇者死也肝開竅於目閉目不欲見人肝病也肝病見肺脈金克木也病若開目而渇心下牢者脈當得𦂳實而數反得浮濇而㣲者死也病實而脈虚也病若吐血復􅍠衂血者脈當沈細而反浮大而牢者死也脫血脈實相反也病若譫言妄語身當有熱脈當洪大而反手足厥逆脈沈細而㣲者死也陽病見隂脈相反也病若大腹而泄者脈當㣲細而濇反𦂳大而滑者死也洩而脈大相反也大腹腹脹也十八難曰脈有三部部有四經手有太隂陽眀足有太陽少隂為上下部何謂也此篇立問之意謂人十二經脈凡有三部每部之中有四經今手有太隂陽眀足有太陽少隂為上下部何也盖三部者以寸闗尺分上中下也四經者兩兩相比則每部各有四經矣手之太隂陽眀足之太陽少隂為上下部肺居右寸腎居左尺循環相資肺髙腎下母子之相望也經云藏真髙於肺藏真下於腎是也然手太隂陽眀金也足少隂太陽水也金生水水流下行而不能上故在下部也足厥隂少陽木也生手太陽少隂火火炎上行而不能下故為上部手心主少陽火生足太隂陽眀土土居中宫故在中部也此皆五行子母更相生養者也手太隂陽眀金下生足太陽少隂水水性下故居下部足少隂太陽水生足厥隂少陽木木生手少隂太陽火及手心主火火炎上行是為上部火生足太隂陽眀土土居中部後生肺金此五行子母更相生養者也此盖因手太隂陽眀足太陽少隂為上下部通推廣五行相生之道越人亦以五藏生成之後因其部分之髙下而推言之非謂未生之前必待如是而後生成也而又演為三部之說即四難所謂心肺俱浮肝腎俱沈脾者中州之意但彼直以藏言此以經言而藏府兼之以上問答眀經此下二節俱不相蒙疑他經錯簡脈有三部九候各何主之然三部者寸闗尺也九候者浮中沈也上部法天主胸已上至頭之有疾也中部法人主鬲以下至臍之有疾也下部法地主臍以下至足之有疾也審而刺之者也謝氏曰此一節當是十六難中答辭錯簡在此而剔出脈有三部九候各何主之十字審而刺之紀氏云欲診脈動而中病不可不審故云審而刺之刺者言其動而中也陳萬年傳曰刺候謂中其候與此義仝或曰刺鍼刺也謂審其部而鍼刺之人病有沈滯乆積聚可切脈而知之耶此下問答亦未詳所属或曰當是十七難中或連年月不已答辭然診在右脇有積氣得肺脈結脈結甚則積甚結㣲則氣㣲結為積聚之脈肺脈見結知右脇有積氣右脇肺部也積氣有㣲甚脈従而應之診不得肺脈而右脇有積氣者何也然肺脈雖不見右手脈當沈伏肺脈雖不見結右手脈當見沈伏沈伏亦積聚脈右手所以候裏也其外痼疾同法耶将異也此承上文復問外之痼疾與内之積聚法將同異然結者脈来去時一止無常數名曰結也伏者脈行筋下也浮者脈在肉上行也左右表裏法皆如此結為積聚伏脈行筋下主裏浮脈行肉上主表所以異也前舉右脇為例故此云左右同法假令脈結伏者内無積聚脈浮結者外無痼疾有積聚脈不結伏有痼疾脈不浮結為脈不應病病不應脈是為死病也有是脈無是病有是病無是脈脈病不相應故為死病也十九難曰經言脈有逆順男女有恒句而反者何謂也恒胡登反常也脈有逆順據男女相比而言也男脈在闗上女脈在闗下男子尺脈恒弱女子尺脈恒盛此男女之别也逆順云者男之順女之逆也女之順男不同也雖然在男女則各有常矣反謂反其常也然男子生於寅寅為木陽也女子生於申申為金隂也故男脈在闗上女脈在闗下是以男子尺脈恒弱女子尺脈恒盛是其常也有圖此推本生物之初而言男女隂陽也紀氏曰生物之初其本原皆始於子子者萬物之所以始也自子推之男左旋三十而至於巳女右旋二十而至於已是男女昬嫁之數也自已而懐娠男左旋十月而生於寅寅為木陽也女右旋十月而生於申申為金隂也謝氏曰寅為木木生火又火生在寅而性炎上故男脈在闗上申為金金生水又水生於申而性流下故女脈在闗下愚謂陽之體輕清而升天道也故男脈在闗上隂之體重濁而降地道也故女脈在闗下此男女之常也反者男得女脈女得男脈也男女異常是之謂反其為病何如問反之為病也然男得女脈為不足病在内左得之病在左右得之病在右隨脈言之也女得男脈為太過病在四肢左得之病在左右得之病在右隨脈言之此之謂也惟其反常故太過不及在内在外之病見焉二十難曰經言脈有伏匿伏匿於何藏而言伏匿邪然謂隂陽更相乘更相伏也脈居隂部而反陽脈見者為陽乘隂也脈雖時沈濇而短此謂陽中伏隂也脈居陽部而反隂脈見者為隂乘陽也脈雖時浮滑而長此謂隂中伏陽也居猶在也當也隂脈尺陽脈寸也乘猶乘車之乘出於其上也伏猶伏兵之伏隠於其中也匿藏也丁氏曰此非特言寸為陽尺為隂以上下言則肌肉之上為陽部肌肉之下為隂部亦通重陽者狂重隂者癲脫陽者見鬼脫隂者目盲此五十九難之文錯簡在此二十一難曰經言人形病脈不病曰生脈病形不病曰死何謂也然人形病脈不病非有不病者也謂息數不應脈數也此大法周仲立曰形體之中覺見憔悴精神昬憒食不忺美而脈得四時之従無過不及之偏是人病脈不病也形體安和而脈息乍大乍小或至或損弦𦂳浮滑沈濇不一戕賊沖和之氣是皆脈息不與形相應乃脈病人不病也仲景云人病脈不病名曰内虚以無穀氣神雖困無苦脈病人不病名曰行尸以無生氣卒眩仆不識人短命則死謝氏曰按本經答文詞意不属似有脫誤二十二難曰經言脈有是動有所生病一脈變為二病者何也然經言是動者氣也所生病者血也邪在氣氣為是動邪在血血為所生病氣主呴之血主濡之氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後所生也呴香勾反濡平聲呴煦也氣主呴之謂氣煦嘘往来薫蒸於皮膚分肉也血主濡之謂血濡潤筋骨滑利闗節榮養藏府也此脈字非尺寸之脈乃十二經隧之脈也此謂十二經隧之脈每脈中輒有二病者盖以有在氣在血之分也邪在氣氣為是而動邪在血血為所生病氣留而不行為氣病血壅而不濡為血病故先為是動後所生病也先後云者抑氣在外血在内外先受邪則内亦従之而病歟然邪亦有只在氣亦有徑在血者又不可以先後拘也詳見靈樞經第十篇二十三難曰手足三隂三陽脈之度數可曉以不然手三陽之脈従手至頭長五尺五六合三丈手三隂之脈従手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺足三陽之脈従足至頭長八尺六八四丈八尺足三隂之脈従足至胸長六尺五寸六六三丈六尺五六三尺合三丈九尺人兩足蹻脈従足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈長一十六丈二尺此所謂十二經脈長短之數也此靈樞廿七篇全文三隂三陽靈樞皆作六隂六陽義尤眀白按經脈之流注則手之三陽従手走至頭手之三隂従腹走至手足之三陽従頭下走至足足之三隂従足上走入腹此舉經脈之度數故皆自手足言人兩足蹻脈指隂蹻也隂蹻脈起於跟中自然骨之後上内踝之上直上循隂股入隂循腹上胸裏行缺盆出人迎之前入頄内㢘属目内􅗃合太陽脈為足少隂之别絡也足三陽之脈従足至頭長八尺考工記亦云人身長八尺盖以同身尺寸言之經脈十二絡脈十五何始何窮也然經脈者行血氣通隂陽以榮於身者也其始従中焦注手太隂陽眀陽眀注足陽眀太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂厥隂復還注手太隂别絡十五皆因其原如環無端轉相灌溉朝於寸口人迎以處百病而決死生也有圖因者隨也原者始也朝猶朝㑹之朝以用也因上文經脈之尺度而推言經絡之行度也直行者謂之經旁出者謂之絡十二經有十二絡兼陽絡隂絡脾之大絡為十五絡也謝氏曰始従中焦者盖謂飲食入口藏於胃其精㣲之化注手太隂陽眀以次相傳至足厥隂厥隂復還注手太隂也絡脈十五皆隨十二經脈之所始轉相灌溉如環之無端朝於寸口人迎以之處百病而決死生也寸口人迎古法以俠喉兩旁動脈為人迎至晉王叔和直以左手闗前一分為人迎右手闗前一分為氣口後世宗之愚謂昔人所以取人迎氣口者盖人迎為足陽眀胃經受穀氣而養五藏者也氣口為手太隂肺經朝百脈而平權衡者也經云眀知終始隂陽定矣何謂也然終始者脈之紀也寸口人迎隂陽之氣通於朝使如環無端故曰始也終者三隂三陽之脈絶絶則死死各有形故曰終也謝氏曰靈樞經第九篇曰凡刺之道畢於終始眀知終始五藏為紀隂陽定矣又曰不病者脈人迎應四時也少氣者脈口人迎俱少而不稱尺寸也此一節因上文寸口人迎處百病決死生而推言之謂欲曉知終始於隂陽乃能定之盖以陽經取決於人迎隂經取決於氣口也朝使者朝謂氣血如水潮應時而灌溉使謂隂陽相為用也始如生物之始終謂生物之窮欲知生死脈以候之隂陽之氣通於朝使如環無端則不病一或不相朝使則病矣況三隂三陽之脈絶乎絶必死矣其死之形状具如下篇尤宜叅㸔二十四難曰手足三隂三陽氣已絶何以為候可知其吉㓙否然足少隂氣絶即骨枯少隂者冬脈也伏行而温於骨髓故骨髓不温即肉不着骨骨肉不相親即肉濡而却肉濡而却故齒長而枯髪無潤澤無潤澤者骨先死戊日篤已日死此下六節與靈樞第十篇文皆大同小異濡讀為軟腎其華在髪其充在骨腎絶則不能充於骨榮於髪肉濡而却謂骨肉不相着而肉濡縮也戊巳土也土勝水故以其所勝之日篤而死矣足太隂氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死脾其華在唇四白其充在肌脾絶則肉滿唇也肉滿謂肌肉不滑澤而𦂳急䐜膹也足厥隂氣絶則筋縮引卵與舌卷厥隂者肝脈也肝者筋之合也筋者聚於隂器而絡於舌本故脈不營則筋縮急筋縮急引卵與舌故舌卷卵縮此筋先死庚日篤辛日死肝者筋之合其華在爪其充在筋筋者聚於隂器而絡於舌本肝絶則筋縮引卵與舌也王充論衡云甲乙病者生死之期常於庚申手太隂氣絶即皮毛焦太隂者肺也行氣温於皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去即皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死肺者氣之本其華在毛其充在皮肺絶則皮毛焦而津液去皮節傷以諸液皆㑹於節也手少隂氣絶則脈不通脈不通則血不流血不流則色澤去故面色黑如黧此血先死壬日篤癸日死心之合脈也其榮色也其華在面其充在血脈心絶則脈不通血不流色澤去也三隂氣俱絶者則目眩轉目瞑目瞑者為失志失志者則志先死死即目瞑也三隂通手足經而言也靈樞十篇作五隂氣俱絶則以手厥隂與手少隂同心經也目眩轉目瞑者即所謂脫隂者目盲此又其甚者也故云目瞑者失志而志先死也四眀陳氏曰五藏隂氣俱絶則其志喪於内故精氣不注於目不見人而死六陽氣俱絶者則隂與陽相離隂陽相離則腠理泄絶汗乃出大如貫珠轉出不流即氣先絶旦占夕死夕占旦死汗出而不流者陽絶故也陳氏曰六府陽氣俱絶則氣敗於外故津液脫而死二十五難曰有十二經五藏六府十一耳其一經者何等經也然一經者手少隂與心主别脈也心主與三焦為表裏俱有名而無形故言經有十二也此篇問答謂五藏六府配手足之隂陽但十一經耳其一經者則以手少隂與心主各别為一脈心主與三焦為表裏俱有名而無形以此一經并五藏六府共十二經也謝氏曰難經言手少隂心主與三焦者凡八篇三十一難分豁三焦經脈所始所終三十六難言腎之有兩左曰腎右曰命門初不以左右腎分兩手尺脈三十八難言三焦者原氣之别主持諸氣復申言其有名無形三十九難言命門者精神之所舎男子藏精女子係胞其氣與腎通又云六府正有五藏三焦亦是一府八難六十二難六十六三篇言腎間動氣者人之生命十二經之根本也其名曰原三焦則原氣之别使也通此篇叅互觀之可見三焦列為六府之乂惟其有名無形故得與手心主合心主為手厥隂其經始於起胸中終於循小指次指出其端若手少隂則始於心中終於循小指之内出其端此手少隂與心主各别為一脈也或問手厥隂經曰心主又曰心包絡何也曰君火以名相火以位手厥隂代相火行事以用而言故曰手心主以經而言則曰心包絡一經而兩名實相火也虞庶云諸家言命門為相火與三焦相表裏按難經止言手心主與三焦為表裏無命門三焦表裏之說夫左寸火右寸金左闗木右闗土左尺水右尺火職之部位其義灼然於乎如虞氏此說則手心主與三焦相為表裏而攝行君火眀矣三十六難謂命門其氣與腎通則亦不離乎腎也其習坎之謂歟手心主為火之閏位命門則水之同氣歟命門不得為相火三焦不與命門配亦眀矣虞氏之說良有㫖哉諸家所以紛紛不決者盖有惑於金匱真言篇王注引正理論謂三焦者有名無形上合手心主下合右腎遂有命門三焦表裏之說夫人之藏府一隂一陽自有定耦豈有一經兩配之理哉夫所謂上合手心主者正言其為表裏下合右腎者則以三焦為原氣之别使而言之爾知此則知命門與腎通三焦無兩配而諸家之言可不辨而自眀矣若夫診脈部位則手厥隂相火居右寸之分而三焦同之命門既與腎通只當居左尺而謝氏據脈經謂手厥隂即手少隂心脈同部三焦脈上見寸口中見於闗下焦與腎同也前既云初不以左右腎分兩手尺脈矣今如脈經所云則右尺當何所候耶二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有隂絡有脾之大絡陽絡者陽蹻之絡也隂絡者隂蹻之絡也故絡有十五焉直行者謂之經傍出者謂之絡經猶江漢之正流絡則沱潛之支派毎經有絡十二經有十二絡如手太隂属肺絡大腸手陽眀属大腸絡肺之類今云絡有十五者以其有陽蹻之絡隂蹻之絡及脾之大絡也陽蹻隂蹻見二十八難謂之絡者盖奇經既不拘於十二經直謂之絡亦可也脾之大絡名曰大包出淵腋三寸布胸脇其動應衣宗氣也四眀陳氏曰陽蹻之絡統諸陽絡隂蹻之絡統諸隂絡脾之大絡又總統隂陽諸絡由脾之能溉養五藏也二十七難曰脈有奇經八脈者不拘於十二經何也然有陽維有隂維有陽蹻有隂蹻有衝有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也脈有奇常十二經者常脈也奇經八脈則不拘於十二經故曰奇經奇對正而言猶兵家之云奇正也虞氏曰奇者奇零之奇不偶之義謂此八脈不係正經隂陽無表裏配合别道奇行故曰奇經也此八脈者督脈督於後任脈任於前衝脈為諸陽之海隂陽維則維絡於身帶脈束之如帶陽蹻得之太陽之别隂蹻本諸少隂之别云經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時霶霈妄作聖人不能復圖也此絡脈滿溢諸經不能復拘也經絡之行有常度矣奇經八脈則不能相従也故以聖人圖設溝渠為譬以見絡脈滿溢諸經不能復拘而為此奇經也然則奇經盖絡脈之滿溢而為之者歟或曰此絡脈三字越人正指奇經而言也既不拘於經直謂之絡脈亦可也此篇兩節舉八脈之名及所以為奇經之義二十八難曰其奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裏上至風府入属於腦任脈者起於中極之下以上毛際循腹裏上闗元至喉咽衝脈者起於氣衝並足陽眀之經夾臍上行至胸中而散也帶脈者起於季脇迴身一周陽蹻脈者起於跟中循外踝上行入風池隂蹻脈者亦起於跟中循内踝上行至咽喉交貫衝脈陽維隂維者維絡於身溢畜不能環流灌溉諸經者也故陽維起於諸陽㑹也隂維起於諸隂交也比於聖人圖設溝渠溝渠滿溢流於深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也繼脈經作繋督之為言都也為陽脈之海所以都綱乎陽脈也其脈起下極之俞由㑹隂厯長强循脊中行至大椎穴與手足三陽脈之交㑹上至瘖門與陽維㑹至百㑹與太陽交㑹下至鼻柱人中與陽眀交㑹任脈起於中極之下曲骨穴任者姙也為人生養之本衝脈起於氣衝穴至胸中而散為隂脈之海内經作並足少隂之經按衝脈行於幽門通谷而上皆少隂也當従内經此督任衝三脈皆起於㑹隂盖一原而分三岐也帶脈起季脇下一寸八分回身一周猶中帶然陽蹻脈於足跟中中脈穴循外踝而行隂蹻脈亦於跟中照海穴循内踝而行蹻者捷也以二脈皆起於足故取蹻捷超越之義陽維隂維維絡於身為隂陽之綱維也陽維所發别於金門以陽交為郄與手足太陽及蹻脈㑹於臑俞與手足少陽㑹於天􅐎及㑹肩井與足少陽㑹於陽白上本神臨泣正營腦空下至風池與督脈㑹於風府瘂門此陽維之起於諸陽㑹也隂維之郄曰築賓與足太隂㑹於腹哀大横又與足太隂厥隂㑹於府舎期門又與任脈㑹於天突亷泉此隂維之起於諸隂交也溢畜不能環流灌溉諸經者也十二字當在十二經亦不能拘之之下則於此無所間而於彼得相従矣其受邪氣畜云云十二字謝氏則以為於本文上下當有缺文然脈經無此疑衍文也或云當在三十七難闗格不得盡其命而死矣之下因邪在六府而言也二十九難曰奇經之為病何如然陽維維於陽隂維維於隂隂陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱隂維為病苦心痛隂蹻為病陽緩而隂急陽蹻為病隂緩而陽急衝之為病逆氣而裏急督之為病脊强而厥任之為病其内苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中此奇經八脈之為病也陽維為病云云十四字說見缺誤總類此言奇經之病也隂不能維於陽則悵然失志陽不能維於隂則溶溶不能自收持陽維行諸陽而主衛衛為氣氣居表故苦寒熱隂維行諸隂而主榮榮為血血属心故苦心痛兩蹻脈病在陽則陽結急在隂則隂結急受病者急不病者自和緩也衝脈従闗元至咽喉故逆氣裏急督脈行背故脊强而厥任脈起胞門行腹故病苦内結男為七疝女為瘕聚也帶脈回身一周故病狀如是溶溶無力貌此各以其經脈所過而言之自二十七難至此義實相因最宜通玩三十難曰榮氣之行常與衛氣相隨不然經言人受氣於穀穀入於胃乃傳與五藏六府五藏六府皆受於氣其清者為榮濁者為衛榮行脈中衛行脈外營周不息五十而復大㑹隂陽相貫如環之無端故知榮衛相隨也􅀈此篇與靈樞第十八篇岐伯之言同但穀入於胃乃傳與五藏六府五藏六府皆受於氣靈樞作穀入於胃以傳與肺五藏六府皆以受氣為少殊爾皆受於氣之氣指水穀之氣而言五十而復大㑹說見一難中四眀陳氏曰榮隂也其行本遲衛陽也其行本速然而清者滑利濁者慓悍皆非濇滯之體故凡衛行於外榮即従行於中是知其行常得相隨共周其度滹南王氏曰清者體之上也陽也大也離中之一隂降故午後一隂生即心之生血也故曰清氣為榮天之清不降天之濁能降為六隂驅而使之下也云清氣者總離之體言也濁者體之下也隂也水也坎中之一陽升故子後一陽生即腎之生氣也故曰濁氣為衛地之濁不升地之清能升為六陽舉而使之上也云濁氣者總坎之體言也經云地氣上為雲天氣下為雨雨出地氣雲出天氣此之謂也愚謂以用而言則清氣為榮者濁中之清者也濁氣為衛者清中之濁者也以體而言則清之用不離乎濁之體濁之用不離乎清之體故謂清氣為榮濁氣為衛亦可也謂榮濁衛清亦可也紀氏女云素問曰榮者水谷之精氣則清衛者水谷之悍氣則濁精氣入於脈中則濁悍氣行於脈外則清或問三十二難云血為榮氣為衛此則榮衛皆以氣言者何也曰經云榮者水谷之精氣衛者水谷之悍氣又云清氣為榮濁氣為衛盖統而言之則榮衛皆水谷之氣故悉以氣言可也析而言之則榮為血而衛為氣固自有分矣是故榮行脈中衛行脈外猶水澤之於川澮風雲之於太虚也難經本義卷上
