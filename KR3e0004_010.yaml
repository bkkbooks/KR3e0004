body:
  text: 五泄傷寒第十五十七難曰泄凡有幾皆有名不然泄凡有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重胃泄者飲食不化色黃脾泄者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血少腹痛大瘕泄者裏急後重數至圊而不能便莖中痛此五泄之要法也五十八難曰傷寒有幾其脈有變不然傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同中風之脈陽浮而滑陰濡而弱濕溫之脈陽濡而弱陰小而急傷寒之脈陰陽俱盛而緊澀熱病之脈陰陽俱浮浮之而滑沉之散澀溫病之脈行在諸經不知何經之動也各隨其經所在而取之傷寒有汗出而愈下之而死者有汗出而死下之而愈者何也然陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之而愈寒熱之病候之如何也然皮寒熱者皮不可近席毛髮焦鼻槀不得汗肌寒熱者肌痛唇舌槀無汗骨寒熱者病無所安汗注不休齒本槀痛五十九難曰狂癲之病何以別之然狂疾之始發少臥而不饑自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休是也癲疾始發意不樂直視僵仆其脈三部陰陽俱盛是也六十難曰頭心之病有厥痛有真痛何謂也然手三陽之脈受風寒伏留而不去者則名厥頭痛入連在腦者名真頭痛其五藏氣相干名厥心痛其痛甚但在心手足青者即名真心痛其真心痛者旦發夕死夕發旦死
