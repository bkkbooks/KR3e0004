body:
  text: 用針補瀉第十三六十九難曰經言虛者補之實者瀉之不實不虛以經取之何謂也然虛者補其母實者瀉其子當先補之然後瀉之不實不虛以經取之者是正經自生病不中他邪也當自取其經故言以經取之七十難曰經言春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陽氣在下人氣亦在下故當深取之春夏各致一陰秋冬各致一陽者何謂也然春夏溫必致一陰者初下針沉之至腎肝之部得氣引持之陰也秋冬寒必致一陽者初內針淺而浮之至心肺之部得氣推內之陽也是謂春夏必致一陰秋冬必致一陽也七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然針陽者臥針而刺之刺陰者先以左手攝按所針榮俞之處氣散乃內針是謂刺榮無傷衛刺衛無傷榮也七十二難曰經言能知迎隨之氣可令調之調氣之方必在陰陽何謂也然所謂迎隨者知榮衛之流行經脈之往來也隨其逆順而取之故曰迎隨調氣之方必在陰陽者知其內外表裏隨其陰陽而調之故曰調氣之方必在陰陽七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也滎者火也火者木之子當刺井者以滎瀉之故經言補者不可以為瀉瀉者不可以為補此之謂也七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺滎者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎其肝心脾肺腎而繫於春夏秋冬者何也然五藏一病輒有五也假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也四時有數而並繫於春夏秋冬者也針之要妙在於秋毫者也七十五難曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也七十六難曰何謂補瀉當補之時何所取氣當瀉之時何所置氣然當補之時從衛取氣當瀉之時從榮置氣其陽氣不足陰氣有餘當先補其陽而後瀉其陰陰氣不足陽氣有餘當先補其陰而後瀉其陽榮衛通行此其要也七十七難曰經言上工治未病中工治已病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉中工治已病者見肝之病不曉相傳但一心治肝故曰治已病也七十八難曰針有補瀉何謂也然補瀉之法非必呼吸出內針也何以言之然知為針者信其左不知為針者信其右當刺之時必先以左手厭按所針滎俞之處彈而努之爪而下之其氣之來如動脈之狀順針而刺之得氣因推而內之是謂補動而伸之是謂瀉不得氣乃與男外女內不得氣是謂十死不治也七十九難曰經言迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無何謂也然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主俞是謂迎而奪之者也補手心主井是謂隨而濟之者也所謂實之與虛者牢濡之意也氣來實牢者為得濡虛者為失故曰若得若失也八十難曰經言有見如入有見如出者何謂也然所謂有見如入有見如出者謂左手見氣來至乃內針針入見氣盡乃出針是謂有見如入有見如出者也八十一難曰經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有實虛也假令肝實而肺虛肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虛微少氣用針不補其肝而反重實其肺故曰實實虛虛損不足而益有餘此者中工之所害也
