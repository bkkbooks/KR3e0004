body:
  text: 藏府積聚第九五十五難曰病有積有聚何以別之然積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五藏所生聚者六府所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處謂之積聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也五十六難曰五藏之積各有名乎以何月何日得之然肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已以季夏戊己日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之心之積名曰伏梁起齊上大如臂上至心下久不愈令人病煩心以秋庚辛日得之何以言之腎病傳心心當傳肺肺以秋適王王者不受邪心復欲還腎腎不肯受故留結為積故知伏梁以秋庚辛日得之脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸日得之何以言之肝病傳脾脾當傳腎腎以冬適王王者不受邪脾復欲還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之肺之積名曰息賁在右脅下覆大如杯久不已令人洒淅寒熱喘咳發肺壅以春甲乙日得之何以言之心病傳肺肺當傳肝肝以春適王王者不受邪肺復欲還心心不肯受故留結為積故知息賁以春甲乙日得之腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎當傳心心以夏適王王者不受邪腎復欲還脾脾不肯受故留結為積故知賁豚以夏丙丁日得之此是五積之要法也
