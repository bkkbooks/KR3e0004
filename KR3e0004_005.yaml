body:
  text: 藏府配像第五三十二難曰五藏俱等而心肺獨在膈上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡營周於外故令心肺在膈上也三十三難曰肝青象木肺白象金肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也然肝者非為純木也乙角也庚之柔大言陰與陽小言夫與婦釋其微陽而吸其微陰之氣其意樂金又行陰道多故令肝得水而沉也肺者非為純金也辛商也丙之柔大言陰與陽小言夫與婦釋其微陰婚而就火其意樂火又行陽道多故令肺得水而浮也肺熟而復沉肝熟而復浮者何也故知辛當歸庚乙當歸甲也三十四難曰五藏各有聲色臭味液皆可曉知以不然十變言肝色青其臭臊其味酸其聲呼其液泣心色赤其臭焦其味苦其聲言其液汗脾色黃其臭香其味甘其聲歌其液涎肺色白其臭腥其味辛其聲哭其液涕腎色黑其臭腐其味鹹其聲呻其液唾是五藏聲色臭味液也五藏有七神各何所藏耶然藏者人之神氣所舍藏也故肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志也三十五難曰五藏各有所府皆相近而心肺獨去大腸小腸遠者何謂也然經言心榮肺衛通行陽氣故居有上大腸小腸傳陰氣而下故居在下所以相去而遠也又諸府者皆陽也清淨之處今大腸小腸胃與膀胱皆受不淨其意何也然諸府者謂是非也經言小腸者受盛之府也大腸者傳瀉行道之府也膽者清淨之府也胃者水穀之府也膀胱者津液之府也一府猶無兩名故知非也小腸者心之府大腸者肺之府胃者脾之府膽者肝之府膀胱者腎之府小腸謂赤腸大腸謂白腸膽者謂青腸胃者謂黃腸膀胱者謂黑腸下焦之所治也三十六難曰藏各有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者諸神精之所舍原氣之所繫也故男子以藏精女子以繫胞故知腎有兩也三十七難曰五藏之氣於何發起通於何許可曉以不然五藏者常內閲于上七竅也故肺氣通於鼻鼻和則知香臭矣肝氣通於目目和則知白黑矣脾氣通於口口和則知穀味矣心氣通於舌舌和則知五味矣腎氣通於耳耳和則知五音矣五藏不和則七竅不通六府不和則留結為癰邪在六府則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五藏則陰脈不和陰脈不和則血留之血留之則陰脈盛矣陰氣太盛則陽氣不得相營也故曰格陽氣太盛則陰氣不得相營也故曰關陰陽俱盛不得相營也故曰關格關格者不得盡其命而死矣經言氣獨行於五藏不營於六府者何也然夫氣之所行也如水之流不得息也故陰脈營於五藏陽脈營於六府如環之無端莫知其紀終而復始其不覆溢人氣內溫於藏府外濡於腠理
