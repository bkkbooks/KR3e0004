  - {type: variant, offset: 2259, length: 0, content: '', WYG: 譬如二字當在人之有尺下此又以脈之有無眀上下部之病也紀氏曰上部有脈下部無脈是邪實并於上即當吐也若無吐證為上無形而下氣竭故云當死東垣李氏曰下部無脈此木鬱也飲食過飽填塞於胸中太隂之分而春陽之令不得上行故也是為木鬱木鬱則達之謂吐之是也謝氏曰上部無脈下部有脈者隂氣盛而陽氣㣲故雖困無能為害上部無脈如樹枝之槁下部有脈如樹之有根惟其有根可以望其生也四眀陳氏曰至進也陽獨盛而至數多也損減也隂獨盛而至數少也至脈従下上謂無隂而陽獨行至於上則陽亦絶而死矣損脈従上下謂無陽而隂獨行至於下則隂亦盡而死矣一難言寸口以決藏府死生吉㓙謂氣口為五藏主也四難言脾受穀味其脈在中是五藏皆以胃為主其脈則主闗上也此難言人之有尺譬如樹之有根脈有根本人有元氣故知不死則以尺為主也此越人所以錯綜其義散見諸篇以見寸闗尺各有所歸重云}
