  - {type: 'tls:seg', offset: 354, content: '', id: KR3e0004_CHANT_001-5a.3}
  - {type: variant, offset: 354, length: 0, content: '', WYG: 覆溢之脈乃孤隂獨陽上下相離之診故曰真藏之脈謂無胃氣以和之也凡人得此脈雖不病猶死也此篇言隂陽之太過不及雖為病脈猶未至危殆若遂上魚入尺而為覆溢則死脈也此遂字最為切𦂳盖承上起下之要言不然則太過不及隂陽相乘闗格覆溢混為一意漫無輕重矣或問此篇之隂陽相乘與二十篇之說同異曰此篇乃隂陽相乘之極而為覆溢二十篇則隂陽更相乘而伏匿也更之一字與此篇遂字大有逕庭更者更互之更遂者直遂之遂而覆溢與伏匿又不能無辨盖覆溢為死脈伏匿為病脈固不可同日語也此書首三篇乃越人開卷第一義也一難言寸口統隂陽闗尺而言二難言尺寸以隂陽始終對待而言闗亦在其中矣三難言覆溢以隂陽闗格而言尤見闗為津要之所合而觀之三部之義備矣一二難言隂陽之常三難言隂陽之變}
