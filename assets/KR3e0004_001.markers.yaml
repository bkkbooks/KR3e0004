  - {type: variant, offset: 143, length: 0, content: '', WYG: 也承上文言人謂平人不病而息數匀者也呼者氣之出陽也吸者氣之入隂也内經平人氣象論云人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息命曰平人故平人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸以呼吸之數言之一日一夜凡足萬三千五百息以脈行之數言之則五十度周於身而榮衛之行於陽者二十五度行於隂者亦二十五度出入隂陽叅交互注無少間斷五十度畢適當漏下百刻為一晬時又眀日之平旦矣迺復㑹於手太隂此寸口所以為五藏六府之所終始而法有取於是焉盖以榮衛始於中焦注手太隂陽眀陽眀注足陽眀太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂計呼吸二百七十息脈行一十六丈二尺漏下二刻為一周身於是復還注手太隂積而盈之人一呼一吸為一息毎刻一百三十五息毎時八刻計一千八十息十二時九十六刻計一萬二千九百六十息刻之餘分得五百四十息合一萬三千五百息也一息脈行六寸毎二刻二百七十息脈行一十六丈二尺毎時八刻脈行六十四丈八尺榮衛四周於身十二時計九十六刻脈行七百七十七丈六尺為四十八周身刻之餘分行二周身得三十二丈四尺總之為五十度周身脈得八百一十丈也此呼吸之息脈行之數周身之度合晝夜百刻之詳也行陽行隂謂行晝行夜}
