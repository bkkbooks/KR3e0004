  - {type: variant, offset: 1458, length: 0, content: '', WYG: 靈樞第四篇曰見其色知其病命曰眀按其脈知其病命曰神問其病知其處命曰工色脈形肉不得相失也色青者其脈弦赤者其脈鈎黄者其脈代白者其脈毛黒者其脈石見其色而不得其脈謂色脈之不相得也色脈既不相得看得何脈得相勝之脈即死得相生之脈病即自巳巳愈也叅合也}
