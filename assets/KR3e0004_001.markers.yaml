  - {type: variant, offset: 938, length: 0, content: '', WYG: 上文言三陽三隂之王脈此言三陽三隂之王時當其時則見其脈也厯家之說以上古十一月甲子合朔冬至為厯元盖取夫氣朔之分齊也然天度之運與日月之行遲速不一嵗各有差越人所謂冬至之後得甲子亦以此歟是故氣朔之不齊節候之早晩不能常也故丁氏注謂冬至之後得甲子或在小寒之初或在大寒之後少陽之至始於此餘經各以次繼之紀氏亦謂自冬至之日一陽始生於冬至之後得甲子少陽脈王也若原其本始以十一月甲子朔合冬至常例推之則少陽之王便當従此日始至正月中餘經各以次繼之少陽之至陽氣尚微故其脈乍大乍小乍短乍長陽眀之至猶有隂也故其脈浮大而短太陽之至陽盛而極也故其脈洪大而長陽盛極則變而之隂矣故夏至後為三隂用事之始而太隂之至隂氣尚㣲故其脈来𦂳大長少隂之至隂漸盛也故其脈𦂳細而㣲厥隂之至隂盛而極也故其脈沈短而敦隂盛極則變而之陽仍三陽用事之始也此則三陽三隂之王脈所以周六甲而循四時率皆従㣲以至乎著自漸而趨於極各有其序也袁氏曰春温而夏暑秋涼而冬寒故人六經之脈亦隨四時隂陽消長迭運而至也劉温舒曰至真要論云厥隂之至其脈弦少隂之至其脈鈎太隂之至其脈沈少陽之至大而浮陽眀之至短而濇太陽之至大而長有隨天地之氣卷舒也如春弦夏洪秋毛冬石之類則五運六氣四時亦皆應之而見於脈爾若平人氣象論太陽脈至洪大而長少陽脈至乍數乍疎乍短乍長陽眀脈至浮大而短難經引之以論三陽三隂之脈者以隂陽始生之淺深而言之也篇首稱經言二字考之樞素無所見平人氣象論雖畧有其說而不詳豈越人之時别有所謂上古文字耶將内經有之而後世脫柬耶是不可知也後凡言經言而無所考者義皆倣此}
