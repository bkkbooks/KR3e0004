  - {type: variant, offset: 3490, length: 0, content: '', WYG: 手太隂陽眀金下生足太陽少隂水水性下故居下部足少隂太陽水生足厥隂少陽木木生手少隂太陽火及手心主火火炎上行是為上部火生足太隂陽眀土土居中部後生肺金此五行子母更相生養者也此盖因手太隂陽眀足太陽少隂為上下部通推廣五行相生之道越人亦以五藏生成之後因其部分之髙下而推言之非謂未生之前必待如是而後生成也而又演為三部之說即四難所謂心肺俱浮肝腎俱沈脾者中州之意但彼直以藏言此以經言而藏府兼之以上問答眀經此下二節俱不相蒙疑他經錯簡}
