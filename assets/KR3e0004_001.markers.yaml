  - {type: variant, offset: 4880, length: 0, content: '', WYG: 汗出而不流者陽絶故也陳氏曰六府陽氣俱絶則氣敗於外故津液脫而死二十五難曰有十二經五藏六府十一耳其一經者何等經也然一經者手少隂與心主别脈也心主與三焦為表裏俱有名而無形故言經有十二也此篇問答謂五藏六府配手足之隂陽但十一經耳其一經者則以手少隂與心主各别為一脈心主與三焦為表裏俱有名而無形以此一經并五藏六府共十二經也謝氏曰難經言手少隂心主與三焦者凡八篇三十一難分豁三焦經脈所始所終三十六難言腎之有兩左曰腎右曰命門初不以左右腎分兩手尺脈三十八難言三焦者原氣之别主持諸氣復申言其有名無形三十九難言命門者精神之所舎男子藏精女子係胞其氣與腎通又云六府正有五藏三焦亦是一府八難六十二難六十六三篇言腎間動氣者人之生命十二經之根本也其名曰原三焦則原氣之别使也通此篇叅互觀之可見三焦列為六府之乂惟其有名無形故得與手心主合心主為手厥隂其經始於起胸中終於循小指次指出其端若手少隂則始於心中終於循小指之内出其端此手少隂與心主各别為一脈也或問手厥隂經曰心主又曰心包絡何也曰君火以名相火以位手厥隂代相火行事以用而言故曰手心主以經而言則曰心包絡一經而兩名實相火也虞庶云諸家言命門為相火與三焦相表裏按難經止言手心主與三焦為表裏無命門三焦表裏之說夫左寸火右寸金左闗木右闗土左尺水右尺火職之部位其義灼然於乎如虞氏此說則手心主與三焦相為表裏而攝行君火眀矣三十六難謂命門其氣與腎通則亦不離乎腎也其習坎之謂歟手心主為火之閏位命門則水之同氣歟命門不得為相火三焦不與命門配亦眀矣虞氏之說良有㫖哉諸家所以紛紛不決者盖有惑於金匱真言篇王注引正理論謂三焦者有名無形上合手心主下合右腎遂有命門三焦表裏之說夫人之藏府一隂一陽自有定耦豈有一經兩配之理哉夫所謂上合手心主者正言其為表裏下合右腎者則以三焦為原氣之别使而言之爾知此則知命門與腎通三焦無兩配而諸家之言可不辨而自眀矣若夫診脈部位則手厥隂相火居右寸之分而三焦同之命門既與腎通只當居左尺而謝氏據脈經謂手厥隂即手少隂心脈同部三焦脈上見寸口中見於闗下焦與腎同也前既云初不以左右腎分兩手尺脈矣今如脈經所云則右尺當何所候耶二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有隂絡有脾之大絡陽絡者陽蹻之絡也隂絡者隂蹻之絡也故絡有十五焉直行者謂之經傍出者謂之絡經猶江漢之正流絡則沱潛之支派毎經有絡十二經有十二絡如手太隂属肺絡大腸手陽眀属大腸絡肺之類今云絡有十五者以其有陽蹻之絡隂蹻之絡及脾之大絡也陽蹻隂蹻見二十八難謂之絡者盖奇經既不拘於十二經直謂之絡亦可也脾之大絡名曰大包出淵腋三寸布胸脇其動應衣宗氣也四眀陳氏曰陽蹻之絡統諸陽絡隂蹻之絡統諸隂絡脾之大絡又總統隂陽諸絡由脾之能溉養五藏也二十七難曰脈有奇經八脈者不拘於十二經何也然有陽維有隂維有陽蹻有隂蹻有衝有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也脈有奇常十二經者常脈也奇經八脈則不拘於十二經故曰奇經奇對正而言猶兵家之云奇正也虞氏曰奇者奇零之奇不偶之義謂此八脈不係正經隂陽無表裏配合别道奇行故曰奇經也此八脈者督脈督於後任脈任於前衝脈為諸陽之海隂陽維則維絡於身帶脈束之如帶陽蹻得之太陽之别隂蹻本諸少隂之别云經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時霶霈妄作聖人不能復圖也此絡脈滿溢諸經不能復拘也經絡之行有常度矣奇經八脈則不能相従也故以聖人圖設溝渠為譬以見絡脈滿溢諸經不能復拘而為此奇經也然則奇經盖絡脈之滿溢而為之者歟或曰此絡脈三字越人正指奇經而言也既不拘於經直謂之絡脈亦可也此篇兩節舉八脈之名及所以為奇經之義二十八難曰其奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裏上至風府入属於腦任脈者起於中極之下以上毛際循腹裏上闗元至喉咽衝脈者起於氣衝並足陽眀之經夾臍上行至胸中而散也帶脈者起於季脇迴身一周陽蹻脈者起於跟中循外踝上行入風池隂蹻脈者亦起於跟中循内踝上行至咽喉交貫衝脈陽維隂維者維絡於身溢畜不能環流灌溉諸經者也故陽維起於諸陽㑹也隂維起於諸隂交也比於聖人圖設溝渠溝渠滿溢流於深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也繼脈經作繋督之為言都也為陽脈之海所以都綱乎陽脈也其脈起下極之俞由㑹隂厯長强循脊中行至大椎穴與手足三陽脈之交㑹上至瘖門與陽維㑹至百㑹與太陽交㑹下至鼻柱人中與陽眀交㑹任脈起於中極之下曲骨穴任者姙也為人生養之本衝脈起於氣衝穴至胸中而散為隂脈之海内經作並足少隂之經按衝脈行於幽門通谷而上皆少隂也當従内經此督任衝三脈皆起於㑹隂盖一原而分三岐也帶脈起季脇下一寸八分回身一周猶中帶然陽蹻脈於足跟中中脈穴循外踝而行隂蹻脈亦於跟中照海穴循内踝而行蹻者捷也以二脈皆起於足故取蹻捷超越之義陽維隂維維絡於身為隂陽之綱維也陽維所發别於金門以陽交為郄與手足太陽及蹻脈㑹於臑俞與手足少陽㑹於天􅐎及㑹肩井與足少陽㑹於陽白上本神臨泣正營腦空下至風池與督脈㑹於風府瘂門此陽維之起於諸陽㑹也隂維之郄曰築賓與足太隂㑹於腹哀大横又與足太隂厥隂㑹於府舎期門又與任脈㑹於天突亷泉此隂維之起於諸隂交也溢畜不能環流灌溉諸經者也十二字當在十二經亦不能拘之之下則於此無所間而於彼得相従矣其受邪氣畜云云十二字謝氏則以為於本文上下當有缺文然脈經無此疑衍文也或云當在三十七難闗格不得盡其命而死矣之下因邪在六府而言也二十九難曰奇經之為病何如然陽維維於陽隂維維於隂隂陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱隂維為病苦心痛隂蹻為病陽緩而隂急陽蹻為病隂緩而陽急衝之為病逆氣而裏急督之為病脊强而厥任之為病其内苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中此奇經八脈之為病也陽維為病云云十四字說見缺誤總類此言奇經之病也隂不能維於陽則悵然失志陽不能維於隂則溶溶不能自收持陽維行諸陽而主衛衛為氣氣居表故苦寒熱隂維行諸隂而主榮榮為血血属心故苦心痛兩蹻脈病在陽則陽結急在隂則隂結急受病者急不病者自和緩也衝脈従闗元至咽喉故逆氣裏急督脈行背故脊强而厥任脈起胞門行腹故病苦内結男為七疝女為瘕聚也帶脈回身一周故病狀如是溶溶無力貌此各以其經脈所過而言之自二十七難至此義實相因最宜通玩三十難曰榮氣之行常與衛氣相隨不然經言人受氣於穀穀入於胃乃傳與五藏六府五藏六府皆受於氣其清者為榮濁者為衛榮行脈中衛行脈外營周不息五十而復大㑹隂陽相貫如環之無端故知榮衛相隨也􅀈此篇與靈樞第十八篇岐伯之言同但穀入於胃乃傳與五藏六府五藏六府皆受於氣靈樞作穀入於胃以傳與肺五藏六府皆以受氣為少殊爾皆受於氣之氣指水穀之氣而言五十而復大㑹說見一難中四眀陳氏曰榮隂也其行本遲衛陽也其行本速然而清者滑利濁者慓悍皆非濇滯之體故凡衛行於外榮即従行於中是知其行常得相隨共周其度滹南王氏曰清者體之上也陽也大也離中之一隂降故午後一隂生即心之生血也故曰清氣為榮天之清不降天之濁能降為六隂驅而使之下也云清氣者總離之體言也濁者體之下也隂也水也坎中之一陽升故子後一陽生即腎之生氣也故曰濁氣為衛地之濁不升地之清能升為六陽舉而使之上也云濁氣者總坎之體言也經云地氣上為雲天氣下為雨雨出地氣雲出天氣此之謂也愚謂以用而言則清氣為榮者濁中之清者也濁氣為衛者清中之濁者也以體而言則清之用不離乎濁之體濁之用不離乎清之體故謂清氣為榮濁氣為衛亦可也謂榮濁衛清亦可也紀氏女云素問曰榮者水谷之精氣則清衛者水谷之悍氣則濁精氣入於脈中則濁悍氣行於脈外則清或問三十二難云血為榮氣為衛此則榮衛皆以氣言者何也曰經云榮者水谷之精氣衛者水谷之悍氣又云清氣為榮濁氣為衛盖統而言之則榮衛皆水谷之氣故悉以氣言可也析而言之則榮為血而衛為氣固自有分矣是故榮行脈中衛行脈外猶水澤之於川澮風雲之於太虚也難經本義卷上}
