  - {type: variant, offset: 639, length: 0, content: '', WYG: 逆順也又設問答以眀隂陽脈見於三部者不單至也惟其不單至故有此六脈相兼而見浮者輕手得之長者過度本位滑者往来流利皆陽脈也沈者重手得之短者不及本位濇者往来凝滯皆隂脈也惟其相兼故有一隂一陽又一陽一隂如是之不一也夫脈之所至病之所在也以脈與病及經絡藏府叅之某為宜某為不宜四時相應不相應以名病之}
