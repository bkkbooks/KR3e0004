  - {type: variant, offset: 1754, length: 0, content: '', WYG: 也平人之脈一呼再至一吸再至呼吸定息脈四至加之則為過減之則不及過與不及所以為至為損焉離經者離其經常之度也奪精精氣衰奪也至脈従下而逆上由腎而之肺也損脈従上而行下由肺而之腎也謝氏曰平人一呼再至脈行三寸今一呼三至則脈行四寸半一息之間至九寸二十息之間一百八十丈比平人行逺過六十丈此至脈之離經也平人一呼脈二至行三寸今一呼一至只得一寸半二十息之間脈遲行六十丈此損脈之離經也若夫至脈之奪精一呼四至則一息之間行一尺二寸損脈之奪精二呼一至則一息之間行三寸其病人甚矣過此者死而命絶}
