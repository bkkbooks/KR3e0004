  - {type: variant, offset: 4123, length: 0, content: '', WYG: 也呴香勾反濡平聲呴煦也氣主呴之謂氣煦嘘往来薫蒸於皮膚分肉也血主濡之謂血濡潤筋骨滑利闗節榮養藏府也此脈字非尺寸之脈乃十二經隧之脈也此謂十二經隧之脈每脈中輒有二病者盖以有在氣在血之分也邪在氣氣為是而動邪在血血為所生病氣留而不行為氣病血壅而不濡為血病故先為是動後所生}
