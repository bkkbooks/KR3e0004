  - {type: variant, offset: 50, length: 0, content: '', WYG: 然者答辭諸篇倣此此一篇之大指下文乃詳言之寸口謂氣口也居手太隂魚際却行一寸之分氣口之下曰闗曰尺云者皆手太隂所厯之處而手太隂又為百脈流注朝㑹之始也五藏别論帝曰氣口何以獨為五藏主岐伯曰胃者水穀之海六府之大源也五味入口藏於胃以養五藏氣而變見於氣口也靈樞第一篇云脈㑹太淵玉版論云行奇恒之法自太隂始注謂先以氣口太隂之脈定四時之正氣然後度量奇恒之氣也經脈别論云肺朝百脈又云氣口成寸以決死生合數論而觀之信知寸口當手太隂之部而為脈之大㑹眀矣此越人立問之意所以獨取夫寸口而後世宗之為不易之法著之篇首乃開卷第一義也學者詳之}
