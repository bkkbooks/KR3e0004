  - {type: variant, offset: 2192, length: 0, content: '', WYG: 一息四至是為平脈一呼三至一吸三至是一息之間脈六至比之平人多二至故曰適得病未甚也然又以前大後小前小後大而言病能也前後非言寸尺猶十五難前曲後居之前後以始末言也一呼四至一吸四至病欲甚矣故脈洪大者苦煩滿病在髙也沈細者腹中痛病在下也各以其病脈言之滑為傷熱者熱傷氣而不傷血血自有餘故脈滑也濇為中霧露者霧露之寒傷入榮血血受寒故脈濇也一呼五至一吸五至其人困矣若脈更見浮大沈細則各隨晝夜而加劇以浮大順晝陽也沈細順夜隂也若不見二者之脈人雖困猶可治小大即沈細浮大也一呼六至一吸六至増之極也故為死脈沈細夜死浮大晝死隂遇隂陽遇陽也一呼一至一吸一至名曰損以血氣皆不足也再呼一至再吸一至謂兩息之間脈再動減之極也經曰形氣有餘脈氣不足者死故曰無魂而當死也}
