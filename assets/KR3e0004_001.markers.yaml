  - {type: variant, offset: 4489, length: 0, content: '', WYG: 謝氏曰靈樞經第九篇曰凡刺之道畢於終始眀知終始五藏為紀隂陽定矣又曰不病者脈人迎應四時也少氣者脈口人迎俱少而不稱尺寸也此一節因上文寸口人迎處百病決死生而推言之謂欲曉知終始於隂陽乃能定之盖以陽經取決於人迎隂經取決於氣口也朝使者朝謂氣血如水潮應時而灌溉使謂隂陽相為用也始如生物之始終謂生物之窮欲知生死脈以候之隂陽之氣通於朝使如環無端則不病一或不相朝使則病矣況三隂三陽之脈絶乎絶必死矣其死之形状具如下篇尤宜叅㸔}
