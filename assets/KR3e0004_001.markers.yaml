  - {type: variant, offset: 463, length: 0, content: '', WYG: 心肺俱浮而有别也心為陽中之陽故其脈浮而大散肺為陽中之隂其脈浮而短濇肝腎俱沈而有别也肝為隂中之陽其脈牢而長腎為隂中之隂其脈按之濡舉指来實古益袁氏謂腎屬水脈按之濡舉指来實外柔内剛水之象也脾說見前}
