  - {type: variant, offset: 2927, length: 0, content: '', WYG: 謝氏曰此篇問三部九候以下共六件而本經並不答所問似有缺文今詳三部九候則十八難中第三章言之當属此篇錯柬在彼隂陽見四難輕重見五難一脈變為四時即十五難春弦夏鈎秋毛冬石也六十首按内經方盛衰篇曰聖人持診之道先後隂陽而持之奇恒之勢乃六十首王註謂奇恒六十首今世不存則失其傳者由来逺矣}
