  - {type: variant, offset: 2990, length: 0, content: '', WYG: 也得肝脈診得肝脈也肝與膽合為清浄之府故善潔肝為将軍之官故善怒善猶喜好也面青肝之色也此外證之色脈情好也臍左肝之部也按之牢若痛謂其動氣按之堅牢而不移或痛也馮氏曰肝氣䐜鬱則四肢滿閉傳曰風􅁋末疾是也厥隂脈循隂器肝病故溲便難轉筋者肝主筋也此内證之部属及所主病}
