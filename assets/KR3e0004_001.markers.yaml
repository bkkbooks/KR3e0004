  - {type: variant, offset: 2825, length: 0, content: '', WYG: 春脈太過則令人善怒忽忽眩暈癲疾不及則令人胸痛引背下則兩脇胠滿夏脈太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄秋脈太過則令人逆氣而背痛愠愠然不及則令人喘呼吸少氣而欬上氣見血下聞病音冬脈太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如饑䏚中清脊中痛少腹滿小便赤此岐伯之言也越人之意盖本諸此變脈言氣者脈不自動氣使之然且主胃氣而言也循撫也按也春脈厭厭聶聶如循榆葉弦而和也益實而滑如循長竿弦多也急而勁益强如新張弓弦但弦也夏脈累累如環如循琅玕鈎而和也如雞舉足鈎多而有力也前曲後居謂按之堅而摶尋之實而据但鈎也秋脈藹藹如車盖按之益大㣲毛也不上不下如循雞羽毛多也按之蕭索如風吹毛但毛也冬脈上大下兊大小適均石而和也上下與来去同義見前篇啄啄連属其中㣲曲石多也来如解索去如彈石但石也大扺四時之脈皆以胃氣為本故有胃氣則生胃氣少則病無胃氣則死於弦鈎毛石中毎有和緩之體為胃氣也此篇與内經中互有異同馮氏曰越人欲使脈之易曉重立其義爾按内經第二卷平人氣象論篇云平肝脈来軟弱招招如掲長竿末梢平肺脈来厭厭聶聶如落榆莢平腎脈来喘喘累累如鈎按之而堅病腎脈来如引葛之益堅死腎脈如發奪索辟辟如彈石此為異也}
