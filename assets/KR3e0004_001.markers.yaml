  - {type: variant, offset: 1624, length: 0, content: '', WYG: 若之為言或也舉色青為例以眀相勝相生也青者肝之色浮濇而短肺脈也為金尅木大而緩脾脈也為木尅土此相勝也浮大而散心脈也為木生火小而滑腎脈也為水生木此相生也此所謂得相勝之脈即死得相生之脈病即自已也}
