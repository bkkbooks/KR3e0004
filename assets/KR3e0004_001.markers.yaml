  - {type: variant, offset: 164, length: 0, content: '', WYG: 尺說文云度名十寸也人手郤十分動脈為寸口十寸為尺䂓矩事也古者寸尺只尋常仭諸度量皆以人之體為法故以以象布指之状十分也人手郤一寸動脈謂之寸口従従一今按如說文所紀尤可見人體中脈之尺寸也尺隂分寸陽分也人之一身經絡榮衛五藏六府莫不由於隂陽而或過與不及於尺寸見焉故為脈之大要㑹也一難言寸口為脈之大㑹以肺朝百脈而言也此言尺寸為脈之大要㑹以隂陽對待而言也大抵手太隂之脈由中焦出行一路直至兩手大指之端其魚際郤行一寸九分通謂之寸口於一寸九分之中曰尺曰寸而闗在其中矣}
