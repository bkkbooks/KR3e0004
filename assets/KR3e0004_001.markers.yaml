  - {type: variant, offset: 728, length: 0, content: '', WYG: 肺最居上主候皮毛故其脈如三菽之重心在肺下主血脈故其脈如六菽之重脾在心下主肌肉故其脈如九菽之重肝在脾下主筋故其脈如十二菽之重腎在肝下主骨故其脈按之至骨舉指来實腎不言菽以類推之當如十五菽之重今按此法以輕重言之即浮中沈之意也然於樞素無所見将古脈法而有所授受耶抑越人自得之見邪廬陵謝氏曰此寸闗尺所主藏府各有分位而一部之中脈自有輕重因舉陵陽虞氏說云假令左手寸口如三菽之重得之乃知肺氣之至如六菽之重得之知本經之至餘以類推之夫如是乃知五藏之氣更相溉灌六脈因兹亦有准繩可以定吉㓙言疾病矣闗尺皆然如十難中十變脈例而消息之也}
