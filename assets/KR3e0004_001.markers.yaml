  - {type: variant, offset: 1040, length: 1, content: 內, WYG: 内也腎間動氣人所得於天以生之氣也腎為子水位乎坎北方卦也乃天一之數而火木金土之先也所以為生氣之原諸經之根本又為守邪之神也原氣勝則邪不能侵原氣絶則死如木根絶而莖葉枯矣故寸口脈平而死者以生氣獨絶於内也此篇與第一難之說義若相悖然各有所指也一難以寸口決死生者謂寸口為脈之大㑹而穀氣之變見也此篇以原氣言也人之原氣盛則生原氣絶則寸口脈雖平猶死也原氣言其體穀氣言其用}
