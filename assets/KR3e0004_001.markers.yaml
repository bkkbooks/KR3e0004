  - {type: variant, offset: 1572, length: 0, content: '', WYG: 靈樞第四篇黄帝曰色脈已定别之奈何岐伯曰調其脈之緩急大小滑濇肉之堅脆而病變定矣黄帝曰調之奈何岐伯答曰脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈小尺之皮膚亦減而少氣脈大尺之皮膚亦賁而起脈滑尺之皮膚亦滑脈濇尺之皮膚亦濇凡此變者有㣲有甚故調尺者不待於寸善調脈者不待於色能叅合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六此通上文所謂色脈形肉不相失也}
