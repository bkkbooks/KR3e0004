  - {type: variant, offset: 4430, length: 1, content: 明, WYG: 始従中焦者盖謂飲食入口藏於胃其精㣲之化注手太隂陽眀以次相傳至足厥隂厥隂復還注手太隂也絡脈十五皆隨十二經脈之所始轉相灌溉如環之無端朝於寸口人迎以之處百病而決死生也寸口人迎古法以俠喉兩旁動脈為人迎至晉王叔和直以左手闗前一分為人迎右手闗前一分為氣口後世宗之愚謂昔人所以取人迎氣口者盖人迎為足陽眀胃經受穀氣而養五藏者也氣口為手太隂肺經朝百脈而平權衡者也經云眀}
