  - {type: variant, offset: 3398, length: 0, content: '', WYG: 此篇立問之意謂人十二經脈凡有三部每部之中有四經今手有太隂陽眀足有太陽少隂為上下部何也盖三部者以寸闗尺分上中下也四經者兩兩相比則每部各有四經矣手之太隂陽眀足之太陽少隂為上下部肺居右寸腎居左尺循環相資肺髙腎下母子之相望也經云藏真髙於肺藏真下於腎是也}
