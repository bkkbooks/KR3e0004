  - {type: variant, offset: 3793, length: 0, content: '', WYG: 有圖此推本生物之初而言男女隂陽也紀氏曰生物之初其本原皆始於子子者萬物之所以始也自子推之男左旋三十而至於巳女右旋二十而至於已是男女昬嫁之數也自已而懐娠男左旋十月而生於寅寅為木陽也女右旋十月而生於申申為金隂也謝氏曰寅為木木生火又火生在寅而性炎上故男脈在闗上申為金金生水又水生於申而性流下故女脈在闗下愚謂陽之體輕清而升天道也故男脈在闗上隂之體重濁而降地道也故女脈在闗下此男女之常也}
