  - {type: variant, offset: 1295, length: 0, content: '', WYG: 靈樞第五篇曰人一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣予之短期按五藏在下吸氣是逺若五十動不滿而一止者知腎無所資氣當先盡盡猶衰竭也衰竭則不能隨諸藏氣而上矣}
