  - {type: variant, offset: 3564, length: 0, content: '', WYG: 謝氏曰此一節當是十六難中答辭錯簡在此而剔出脈有三部九候各何主之十字審而刺之紀氏云欲診脈動而中病不可不審故云審而刺之刺者言其動而中也陳萬年傳曰刺候謂中其候與此義仝或曰刺鍼刺也謂審其部而鍼刺之}
