  - {type: variant, offset: 1413, length: 0, content: '', WYG: 靈樞第一篇曰凡将用鍼必先診脈視氣之劇易乃可以治之也又第三篇曰所謂五藏之氣已絶於内者脈口氣内絶不至反取其外之病處與陽經之合有留鍼以致陽氣陽氣至則内重竭重竭則死矣其死也無氣以動故静所謂五藏之氣已絶於外者脈口氣外絶不至反取其四末之輸有留鍼以致其隂氣隂氣至則陽氣反入入則逆逆則死矣其死也隂氣有餘故躁此靈樞以脈口内外言隂陽也越人以心肺腎肝内外别隂陽其理亦由是也紀氏謂此篇言鍼法馮氏玠謂此篇合入用鍼補瀉之類當在六十難之後以例相従也}
