  - {type: variant, offset: 2443, length: 0, content: '', WYG: 此内經平人氣象玉機真藏論叅錯其文而為篇也春脈弦者肝主筋應筋之象夏脈鈎者心主血脈應血脈来去之象秋脈毛者肺主皮毛冬脈石者腎主骨各應其象兼以時物之象取義也来疾去遲劉立之曰来者自骨肉之分而出於皮膚之際氣之升而上也去者自皮膚之際而還於骨肉之分氣之降而下也}
