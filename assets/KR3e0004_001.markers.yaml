  - {type: variant, offset: 35, length: 0, content: '', WYG: 十二經謂手足三隂三陽合為十二經也手經則太隂肺陽眀大腸少隂心太陽小腸厥隂心包少陽三焦也足經則太隂脾陽眀胃少隂腎太陽膀胱厥隂肝少陽膽也皆有動脈者如手太隂脈動中府雲門天府俠白手陽眀脈動合谷陽谿手少隂脈動極泉手太陽脈動天窻手厥隂脈動勞宫手少陽脈動禾窌足太隂脈動箕門衝門足陽眀脈動衝陽大迎人迎氣衝足少隂脈動太谿隂谷足太陽脈動委中足厥隂脈動太沖五里隂㢘足少陽脈動下闗聽㑹之類也謂之經者以榮衛之流行經常不息者而言謂之脈者以血氣之分袤行體者而言也故經者徑也脈者陌也越人之意盖謂凡此十二經經皆有動脈如上文所云者今置不取乃獨取寸口以決藏府死生吉㐫何耶}
