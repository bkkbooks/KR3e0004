body:
  text: 藏府傳病第八五十三難曰經言七傳者死間藏者生何謂也然七傳者傳其所勝也間藏者傳其子也何以言之假令心病傳肺肺傳肝肝傳脾脾傳腎腎傳心一藏不再傷故言七傳者死也間藏者傳其所生也假令心病傳脾脾傳肺肺傳腎腎傳肝肝傳心是母子相傳竟而復始如環之無端故言生也五十四難曰藏病難治府病易治何謂也然藏病所以難治者傳其所勝也府病易治者傳其子也與七傳間藏同法也
