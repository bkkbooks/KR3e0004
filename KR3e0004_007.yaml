body:
  text: 虛實邪正第七四十八難曰人有三虛三實何謂也然有脈之虛實有病之虛實有診之虛實也脈之虛實者濡者為虛緊牢者為實病之虛實者出者為虛入者為實言者為虛不言者為實緩者為虛急者為實診之虛實者癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛故曰虛實也四十九難曰有正經自病有五邪所傷何以別之然經言憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆上而不下則傷肝飲食勞倦則傷脾久坐濕地強力入水則傷腎是正經之自病也何謂五邪然有中風有傷暑有飲食勞倦有傷寒有中濕此之謂五邪假令心病何以知中風得之然其色當赤何以言之肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑肝為心邪故知當赤色也其病身熱脅下滿痛其脈浮大而絃何以知傷暑得之然當惡焦臭何以言之心主臭自入為焦臭入脾為香臭入肝為臊臭入腎為腐臭入肺為腥臭故知心病傷暑得之當惡焦臭也其病身熱而煩心痛其脈浮大而散何以知飲食勞倦得之然當喜苦味也實為欲食何以言之脾主味入肝為酸入心為苦入肺為辛入腎為鹹自入為甘故知脾邪入心為喜苦味也其病身熱而體重嗜臥四肢不收其脈浮大而緩何以知傷寒得之然當譫言妄語何以言之肺主聲入肝為呼入心為言入脾為歌入腎為呻自入為哭故知肺邪入心為譫言妄語也其病身熱灑灑惡寒甚則喘咳其脈浮大而澀何以知中濕得之然當喜汗出不可止何以言之腎主液入肝為泣入心為汗入脾為涎入肺為涕自入為唾故知腎邪入心為汗出不可止也其病身熱而小腹痛足脛寒而逆其脈沉濡而大此五邪之法也五十難曰病有虛邪有實邪有賊邪有微邪有正邪何以別之然從後來者為虛邪從前來者為實邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪何以言之假令心病中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪五十一難曰病有欲得溫者有欲得寒者有欲得見人者有不欲得見人者而各不同病在何藏府也然病欲得寒而欲見人者病在府也病欲得溫而不欲得見人者病在藏也何以言之府者陽也陽病欲得寒又欲見人藏者陰也陰病欲得溫又欲閉戶獨處惡聞人聲故以別知藏府之病也五十二難曰府藏發病根本等不然不等也其不等奈何然藏病者止而不移其病不離其處府病者倣佛賁嚮上下行流居處無常故以此知藏府根本不同也
