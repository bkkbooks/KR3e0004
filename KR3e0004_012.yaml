body:
  text: 藏府井俞第十二六十二難曰藏井滎有五府獨有六者何謂也然府者陽也三焦行於諸陽故置一俞名曰原府有六者亦與三焦共一氣也六十三難曰十變言五藏六府滎合皆以井為始者何也然井者東方春也萬物之始生諸蚑行喘息蜎飛蠕動當生之物莫不以春而生故歲數始於春日數始於甲故以井為始也六十四難曰十變又言陰井木陽井金陰滎火陽滎水陰俞土陽俞木陰經金陽經火陰合水陽合土陰陽皆不同其意何也然是剛柔之事也陰井乙木陽井庚金陽井庚庚者乙之剛也陰井乙乙者庚之柔也乙為木故言陰井木也庚為金故言陽井金也餘皆倣此六十五難曰經言所出為井所入為合其法奈何然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入藏故言所入為合也六十六難曰經言肺之原出于太淵心之原出于太陵肝之原出于太衝脾之原出于太白腎之原出于太溪少陰之原出于兌骨膽之原出于丘墟胃之原出于衝陽三焦之原出于陽池膀胱之原出于京骨大腸之原出于合谷小腸之原出于腕骨十二經皆以俞為原者何也然五藏俞者三焦之所行氣之所留止也三焦所行之俞為原者何也然臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也主通行三氣經歷於五藏六府原者三焦之尊號也故所止輒為原五藏六府之有病者皆取其原也六十七難曰五藏募皆在陰而俞在陽者何謂也然陰病行陽陽病行陰故令募在陰俞在陽也六十八難曰五藏六府各有井滎俞經合皆何所主然經言所出為井所流為滎所注為俞所行為經所入為合井主心下滿滎主身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄此五藏六府其井滎俞經合所主病也
