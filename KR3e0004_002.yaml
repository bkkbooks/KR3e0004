body:
  text: 經絡大數第二二十五難曰有十二經五藏六府十一耳其一經者何等經也然一經者手少陰與心主別脈也心主與三焦為表裏俱有名而無形故言經有十二也二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有陰絡有脾之大絡陽絡者陽蹻之絡也陰絡者陰蹻之絡也故絡有十五焉
